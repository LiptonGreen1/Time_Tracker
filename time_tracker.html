<title>Time Tracker</title>

<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
font-family:-apple-system,Arial,sans-serif;
margin:0;
background:#111;
color:white;

padding:15px;

text-align:center;
}

.update-btn{

top:50%;
transform:translateY(-50%);

border:1px solid #555;

.main-screen{

padding:20px 10px 100px;

color:#0a84ff;
margin-bottom:4px;

text-align:center;
padding:0 10px;

.timer-display{

}

.buttons-row{
display:flex;
align-items:center;
gap:16px;
margin-bottom:24px;
}

.start-btn{
width:80px;
height:80px;
border-radius:50%;
border:3px solid #0a84ff;
background:none;
color:#0a84ff;
font-size:14px;
font-weight:600;
}

.start-btn:active{
background:rgba(10,132,255,0.2);
}

.parallel-btn{
width:52px;
height:52px;
border-radius:50%;
border:2px solid #ff9f0a;
background:none;
color:#ff9f0a;

font-weight:600;

.recent-records{

}

.recent-record{

color:rgba(255,255,255,0.45);
padding:4px 0;
border-bottom:1px solid rgba(255,255,255,0.08);

/* --- Рабочий трекер --- */

.work-tracker{

margin-top:16px;

.week-day{
font-size:12px;

width:32px;
height:32px;

align-items:center;
justify-content:center;
border-radius:50%;

color:white;
font-weight:600;

.work-row{
display:flex;
justify-content:space-between;
align-items:center;

.work-label{color:rgba(255,255,255,0.5);font-size:12px}
.work-value{font-variant-numeric:tabular-nums}
.work-pct{color:rgba(255,255,255,0.4);font-size:11px;margin-left:6px}

.work-week-val{

text-decoration-style:dotted;
text-underline-offset:3px;
cursor:pointer;
}

/* --- Оверлей --- */

.overlay{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.92);
z-index:100;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
overscroll-behavior:contain;
}

.overlay.open{display:block}

.overlay-header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
background:rgba(0,0,0,0.95);
z-index:1;
}

.overlay-header span{font-size:18px}

.overlay-close{
background:none;
border:none;
color:#0a84ff;
font-size:16px;
padding:8px;
}

/* --- Picker (выбор задач) --- */

.picker-hint{
padding:0 15px 8px;
font-size:12px;
color:rgba(255,255,255,0.4);
}

.picker-confirm{
margin:0 15px 16px;
padding:13px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:600;
width:calc(100% - 30px);
text-align:center;
transition:opacity 0.15s;
}

.picker-confirm.single{
background:#0a84ff;
color:white;
}

.picker-confirm.parallel{
background:#ff9f0a;
color:#000;
}

.picker-confirm.disabled{
opacity:0.25;
pointer-events:none;
}

.group{
padding:0 15px;
margin-bottom:10px;
}

.group-title{
font-size:13px;
padding:6px 10px;
margin-bottom:6px;
opacity:0.45;
text-transform:uppercase;
letter-spacing:1px;
border:1px solid rgba(255,255,255,0.15);

}

.group-activities{
display:flex;
flex-wrap:wrap;
gap:6px;
padding-left:8px;
}

.activity{
display:inline-block;
padding:8px 14px;
border:none;
background:#222;
color:white;
font-size:14px;
border-radius:8px;
}

.activity:active{background:#333}
.activity.active{background:#0a84ff}
.activity.selected{background:#ff9f0a;color:#000}

/* --- Week detail overlay --- */

.week-detail{
padding:15px;
}

.week-detail-nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.week-detail-nav button{
background:none;
border:none;
color:#0a84ff;
font-size:20px;
padding:8px 12px;
}

.week-detail-dates{
font-size:14px;
color:rgba(255,255,255,0.7);
}

.week-detail-row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.06);
font-size:13px;
}

.week-detail-total{
margin-top:8px;
padding-top:8px;
border-top:1px solid rgba(255,255,255,0.15);
font-size:14px;
font-weight:600;
display:flex;
justify-content:space-between;
}

/* --- Нижняя панель --- */

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#222;
padding:8px 10px;
padding-bottom:max(8px,env(safe-area-inset-bottom));
display:flex;
gap:5px;
z-index:50;
}

.bottom button{
flex:1;
padding:10px 4px;
border:none;
background:#333;
color:white;
border-radius:6px;
font-size:12px;
}

/* --- История --- */

#history{
display:none;
padding:10px;
padding-bottom:80px;
}

.record{
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
font-size:12px;
line-height:1.5;
color:rgba(255,255,255,0.8);
}

</style>

</head>

<body>

<header>
Учёт времени
<button class="update-btn" onclick="checkUpdate()">↻</button>
</header>

<div class="main-screen" id="main">
  <div class="current-activity" id="currentActivity"></div>
  <div class="timer-display" id="timer">00:00:00</div>
  <div class="buttons-row">
    <button class="start-btn" onclick="openPicker(false)">ПУСК</button>
    <button class="parallel-btn" onclick="openPicker(true)">ПУСК<br>×2</button>
  </div>
  <div class="recent-records" id="recentRecords"></div>

  <div class="work-tracker" id="workTracker">
    <div class="week-days" id="weekDays"></div>
    <div class="work-row">
      <span class="work-label">Сегодня</span>
      <span><span class="work-value" id="workToday">00:00</span> / 10:00<span class="work-pct" id="workTodayPct"></span></span>
    </div>
    <div class="work-row">
      <span class="work-label">Неделя</span>
      <span><span class="work-value work-week-val" id="workWeek" onclick="openWeekDetail(0)">00:00</span> / 70:00<span class="work-pct" id="workWeekPct"></span></span>
    </div>
  </div>
</div>

<div class="overlay" id="picker">
  <div class="overlay-header">
    <span id="pickerTitle">Задача</span>
    <button class="overlay-close" onclick="closePicker()">Закрыть</button>
  </div>
  <div class="picker-hint" id="pickerHint">Выберите 1 задачу</div>
  <button class="picker-confirm single disabled" id="pickerConfirm" onclick="confirmPicker()">Запустить</button>
  <div id="pickerList"></div>
</div>

<div class="overlay" id="weekOverlay">
  <div class="overlay-header">
    <span>Рабочие часы</span>
    <button class="overlay-close" onclick="closeWeekDetail()">Закрыть</button>
  </div>
  <div class="week-detail" id="weekDetail"></div>
</div>

<div id="history"></div>

<div class="bottom">
<button onclick="showMain()">Главная</button>
<button onclick="showHistory()">История</button>
<button onclick="addActivity()">Добавить</button>
<button onclick="exportData()">Экспорт</button>
<button onclick="importData()">Импорт</button>
</div>

<script>

// --- Scroll lock ---
let scrollY=0;
function lockScroll(){
  scrollY=window.scrollY;
  document.body.classList.add('overlay-open');
  document.body.style.top=-scrollY+'px';
}
function unlockScroll(){
  document.body.classList.remove('overlay-open');
  document.body.style.top='';
  window.scrollTo(0,scrollY);
}

// --- IndexedDB wrapper ---
const DB_NAME = 'timetracker';
const DB_STORE = 'state';

function dbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(DB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbSave(data) {
  return dbOpen().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(data, 'main');
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  }));
}

function dbLoad() {
  return dbOpen().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get('main');
    req.onsuccess = () => { db.close(); resolve(req.result || null); };
    req.onerror = () => { db.close(); reject(req.error); };
  }));
}

// --- Manual update ---
function checkUpdate(){
  caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.getRegistration().then(reg => {
        if (reg) reg.unregister().then(() => location.reload());
        else location.reload();
      });
    } else {
      location.reload();
    }
  });
}

// --- Service Worker registration ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    setInterval(() => reg.update(), 30000);
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'activated') location.reload();
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    location.reload();
  });
}
if (navigator.storage && navigator.storage.persist) {
  navigator.storage.persist();
}

// --- Default state ---
const DEFAULT_STATE = {
groups:[
{id:1,name:"Работа"},
{id:2,name:"Отдых"},
{id:3,name:"Быт"},
{id:4,name:"Сон"}
],
activities:[
{id:1,name:"Кодинг",group:1},
{id:2,name:"Анализ",group:1},
{id:3,name:"YouTube",group:2},
{id:4,name:"Готовка",group:3},
{id:5,name:"Сон",group:4}
],
records:[],
active:[]
};

let state = DEFAULT_STATE;

const DAY_NAMES = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
const WORK_GROUP_NAME = 'Работа';

// --- Helpers ---
function mskNow(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Moscow'}));
}

function mskDayStartUTC(year, month, day){
  const str = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}T00:00:00+03:00`;
  return new Date(str).getTime();
}

function getMondayMSK(mskD){
  const d = new Date(mskD);
  let dow = d.getDay();
  if(dow===0) dow=7;
  d.setDate(d.getDate()-(dow-1));
  d.setHours(0,0,0,0);
  return d;
}

function toMSK(iso){
  if(!iso) return '...';
  return new Date(iso).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Moscow'});
}

function toMSKDate(iso){
  if(!iso) return '';
  const d = new Date(new Date(iso).toLocaleString('en-US',{timeZone:'Europe/Moscow'}));
  const dow = d.getDay();
  const dayName = DAY_NAMES[dow===0?6:dow-1];
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return dayName+' | '+dd+'.'+mm;
}

function formatTime(iso){
  if(!iso) return '...';
  return toMSK(iso)+' ('+toMSKDate(iso)+')';
}

function hhmmFromMs(ms){
  if(ms<=0) return '00:00';
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

function durationStr(ms){
  if(ms<=0) return '0м';
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  if(h>0) return h+'ч '+m+'м';
  return m+'м';
}

function getActivityName(id){
  const a=state.activities.find(x=>x.id==id);
  return a?a.name:'?';
}

function getGroupName(actId){
  const a=state.activities.find(x=>x.id==actId);
  if(!a) return '?';
  const g=state.groups.find(x=>x.id==a.group);
  return g?g.name:'?';
}

function isWorkActivity(actId){
  const a=state.activities.find(x=>x.id==actId);
  if(!a) return false;
  const g=state.groups.find(x=>x.id==a.group);
  return g && g.name===WORK_GROUP_NAME;
}

function formatRecord(r){
  const grp=getGroupName(r.activity);
  const act=getActivityName(r.activity);
  const from=formatTime(r.start);
  const to=r.end?formatTime(r.end):'...';
  const ms=r.end?(new Date(r.end)-new Date(r.start)):0;
  const dur=r.end?durationStr(ms):'...';
  return grp+' | '+act+': с '+from+' до '+to+' — '+dur;
}

function getActive(){
  return state.records.filter(r=>r.end===null);
}

function closeAll(now){
  state.records.forEach(r=>{if(r.end===null) r.end=now});
  state.active=[];
}

// --- Calculate work ms (merged intervals) ---
function calcWorkMs(fromUTC, toUTC){
  const intervals=[];
  state.records.forEach(r=>{
    if(!isWorkActivity(r.activity)) return;
    const rs=new Date(r.start).getTime();
    const re=r.end?new Date(r.end).getTime():Date.now();
    const s=Math.max(rs,fromUTC);
    const e=Math.min(re,toUTC);
    if(e>s) intervals.push([s,e]);
  });
  if(!intervals.length) return 0;
  intervals.sort((a,b)=>a[0]-b[0]);
  const merged=[[...intervals[0]]];
  for(let i=1;i<intervals.length;i++){
    const last=merged[merged.length-1];
    if(intervals[i][0]<=last[1]) last[1]=Math.max(last[1],intervals[i][1]);
    else merged.push([...intervals[i]]);
  }
  let total=0;
  merged.forEach(iv=>total+=iv[1]-iv[0]);
  return total;
}

// --- Migrate ---
function migrateState(data){
  if(data.active && !Array.isArray(data.active)) data.active=[];
  else if(!data.active) data.active=[];
  return data;
}

// --- Init ---
(async function init() {
  let data = null;
  try { data = await dbLoad(); } catch(e) {}
  if (!data) {
    const ls = localStorage.getItem("timedata");
    if (ls) {
      data = JSON.parse(ls);
      try { await dbSave(data); } catch(e) {}
    }
  }
  state = data ? migrateState(data) : DEFAULT_STATE;
  state.active = state.records.filter(r=>r.end===null).map(r=>r.id);
  renderMain();
  updateTimer();
  updateWorkTracker();
})();

function save(){
  state.active = state.records.filter(r=>r.end===null).map(r=>r.id);
  localStorage.setItem("timedata",JSON.stringify(state));
  dbSave(state).catch(()=>{});
}

// --- Unified Picker ---
let pickerParallel = false;
let pickerSelected = [];

function openPicker(parallel){
  pickerParallel = parallel;
  pickerSelected = [];
  const btn = document.getElementById('pickerConfirm');
  document.getElementById('pickerTitle').innerText = parallel ? 'Параллельные задачи' : 'Задача';
  document.getElementById('pickerHint').innerText = parallel ? 'Выберите 2 задачи' : 'Выберите 1 задачу';
  btn.className = 'picker-confirm '+(parallel?'parallel':'single')+' disabled';
  btn.innerText = 'Запустить';
  renderPickerList();
  lockScroll();
  document.getElementById('picker').classList.add('open');
}

function renderPickerList(){
  const list=document.getElementById('pickerList');
  list.innerHTML='';
  state.groups.forEach(g=>{
    const div=document.createElement('div');
    div.className='group';
    const title=document.createElement('div');
    title.className='group-title';
    title.innerText=g.name;
    div.appendChild(title);
    const wrap=document.createElement('div');
    wrap.className='group-activities';
    state.activities.filter(a=>a.group==g.id).forEach(a=>{
      const btn=document.createElement('button');
      btn.className='activity';
      btn.innerText=a.name;
      if(pickerSelected.includes(a.id)){
        btn.classList.add(pickerParallel?'selected':'active');
      }
      btn.onclick=()=>onPickerSelect(a.id);
      wrap.appendChild(btn);
    });
    div.appendChild(wrap);
    list.appendChild(div);
  });
}

function onPickerSelect(actId){
  const max = pickerParallel ? 2 : 1;
  const idx = pickerSelected.indexOf(actId);
  if(idx>=0){
    pickerSelected.splice(idx,1);
  } else {
    if(pickerSelected.length>=max){
      // Replace last for single, ignore for parallel
      if(!pickerParallel) pickerSelected=[actId];
      else return;
    } else {
      pickerSelected.push(actId);
    }
  }
  updateConfirmBtn();
  renderPickerList();
}

function updateConfirmBtn(){
  const btn=document.getElementById('pickerConfirm');
  const ready = pickerParallel ? pickerSelected.length===2 : pickerSelected.length===1;
  btn.className='picker-confirm '+(pickerParallel?'parallel':'single')+(ready?'':' disabled');
  if(pickerSelected.length===0){
    btn.innerText='Запустить';
  } else if(pickerParallel && pickerSelected.length===2){
    btn.innerText='Запустить: '+getActivityName(pickerSelected[0])+' + '+getActivityName(pickerSelected[1]);
  } else if(pickerParallel && pickerSelected.length===1){
    btn.innerText='Запустить: '+getActivityName(pickerSelected[0])+' + ...';
  } else {
    btn.innerText='Запустить: '+getActivityName(pickerSelected[0]);
  }
}

function confirmPicker(){
  const ready = pickerParallel ? pickerSelected.length===2 : pickerSelected.length===1;
  if(!ready) return;
  const now=new Date().toISOString();
  closeAll(now);
  const ts=Date.now();
  pickerSelected.forEach((actId,i)=>{
    state.records.push({id:ts+i,activity:actId,start:now,end:null});
  });
  save();
  renderMain();
  closePicker();
}

function closePicker(){
  document.getElementById('picker').classList.remove('open');
  unlockScroll();
}

// --- Render main ---
function renderMain(){
  const cur=document.getElementById('currentActivity');
  const active=getActive();
  if(active.length>1){
    cur.innerText=active.map(r=>getGroupName(r.activity)+' | '+getActivityName(r.activity)).join('  +  ');
  } else if(active.length===1){
    cur.innerText=getGroupName(active[0].activity)+' | '+getActivityName(active[0].activity);
  } else {
    cur.innerText='Нет активности';
  }
  const container=document.getElementById('recentRecords');
  container.innerHTML='';
  active.forEach(r=>{
    const div=document.createElement('div');
    div.className='recent-record';
    div.style.color='rgba(255,255,255,0.7)';
    div.innerText=formatRecord(r);
    container.appendChild(div);
  });
  const completed=state.records.filter(r=>r.end!==null);
  completed.slice(-3).reverse().forEach(r=>{
    const div=document.createElement('div');
    div.className='recent-record';
    div.innerText=formatRecord(r);
    container.appendChild(div);
  });
  renderWeekDays();
}

// --- Week days row ---
function renderWeekDays(){
  const el=document.getElementById('weekDays');
  el.innerHTML='';
  const now=mskNow();
  let todayDow=now.getDay();
  if(todayDow===0) todayDow=7;
  for(let i=1;i<=7;i++){
    const d=document.createElement('div');
    d.className='week-day';
    d.innerText=DAY_NAMES[i-1];
    if(i===todayDow) d.classList.add('today');
    el.appendChild(d);
  }
}

// --- Work tracker live update ---
function updateWorkTracker(){
  const now=mskNow();
  const todayStart=mskDayStartUTC(now.getFullYear(),now.getMonth()+1,now.getDate());
  const todayEnd=todayStart+86400000;
  const todayMs=calcWorkMs(todayStart,todayEnd);

  document.getElementById('workToday').innerText=hhmmFromMs(todayMs);
  const todayPct=(todayMs/36000000*100).toFixed(1);
  document.getElementById('workTodayPct').innerText=' ('+todayPct+'%)';

  const monday=getMondayMSK(now);
  const weekStart=mskDayStartUTC(monday.getFullYear(),monday.getMonth()+1,monday.getDate());
  const weekEnd=weekStart+7*86400000;
  const weekMs=calcWorkMs(weekStart,weekEnd);

  document.getElementById('workWeek').innerText=hhmmFromMs(weekMs);
  const weekPct=(weekMs/252000000*100).toFixed(1);
  document.getElementById('workWeekPct').innerText=' ('+weekPct+'%)';
}

function updateTimer(){
  const el=document.getElementById('timer');
  const active=getActive();
  if(!active.length){el.innerText='00:00:00';return}
  const earliest=Math.min(...active.map(r=>new Date(r.start).getTime()));
  const diff=(Date.now()-earliest)/1000;
  const h=Math.floor(diff/3600);
  const m=Math.floor(diff%3600/60);
  const s=Math.floor(diff%60);
  el.innerText=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  updateWorkTracker();
}

setInterval(updateTimer,1000);

// --- Week detail overlay ---
let weekDetailOffset=0;

function openWeekDetail(offset){
  weekDetailOffset=offset||0;
  renderWeekDetail();
  lockScroll();
  document.getElementById('weekOverlay').classList.add('open');
}

function closeWeekDetail(){
  document.getElementById('weekOverlay').classList.remove('open');
  unlockScroll();
}

function renderWeekDetail(){
  const container=document.getElementById('weekDetail');
  const now=mskNow();
  const monday=getMondayMSK(now);
  monday.setDate(monday.getDate()+weekDetailOffset*7);
  const weekStart=mskDayStartUTC(monday.getFullYear(),monday.getMonth()+1,monday.getDate());

  const sunday=new Date(monday);
  sunday.setDate(sunday.getDate()+6);
  const fmt=d=>String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');

  let html='<div class="week-detail-nav">';
  html+='<button onclick="weekDetailOffset--;renderWeekDetail()">‹</button>';
  html+='<span class="week-detail-dates">'+fmt(monday)+' — '+fmt(sunday)+'</span>';
  if(weekDetailOffset<0) html+='<button onclick="weekDetailOffset++;renderWeekDetail()">›</button>';
  else html+='<button style="visibility:hidden">›</button>';
  html+='</div>';

  let totalMs=0;
  for(let i=0;i<7;i++){
    const dayStart=weekStart+i*86400000;
    const dayEnd=dayStart+86400000;
    const ms=calcWorkMs(dayStart,dayEnd);
    totalMs+=ms;
    const pct=(ms/36000000*100).toFixed(1);
    html+='<div class="week-detail-row"><span>'+DAY_NAMES[i]+'</span><span>+'+hhmmFromMs(ms)+' = +'+pct+'%</span></div>';
  }

  const totalPct=(totalMs/252000000*100).toFixed(1);
  html+='<div class="week-detail-total"><span>Итого</span><span>'+hhmmFromMs(totalMs)+' / 70:00 ('+totalPct+'%)</span></div>';

  container.innerHTML=html;
}

// --- Navigation ---
function showMain(){
  document.getElementById('main').style.display='flex';
  document.getElementById('history').style.display='none';
  renderMain();
}

function showHistory(){
  document.getElementById('main').style.display='none';
  const h=document.getElementById('history');
  h.style.display='block';
  h.innerHTML='';
  state.records.slice().reverse().forEach(r=>{
    const div=document.createElement('div');
    div.className='record';
    div.innerText=formatRecord(r);
    h.appendChild(div);
  });
}

function addActivity(){
  const name=prompt('Название активности');
  if(!name)return;
  const group=prompt('Название группы');
  let g=state.groups.find(x=>x.name==group);
  if(!g){
    g={id:Date.now(),name:group};
    state.groups.push(g);
  }
  state.activities.push({id:Date.now()+1,name:name,group:g.id});
  save();
}

function exportData(){
  const blob=new Blob([JSON.stringify(state)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='timedata.json';
  a.click();
}

function importData(){
  const input=document.createElement('input');
  input.type='file';
  input.onchange=e=>{
    const reader=new FileReader();
    reader.onload=()=>{
      state=migrateState(JSON.parse(reader.result));
      state.active=state.records.filter(r=>r.end===null).map(r=>r.id);
      save();
      renderMain();
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

</script>
