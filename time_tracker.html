<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Time Tracker</title>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
padding:15px;
background:#222;
font-size:20px;
}

.container{
padding:10px;
}

.group{
margin-top:20px;
}

.group-title{
font-size:18px;
margin-bottom:8px;
opacity:0.8;
}

.activity{
display:block;
width:100%;
padding:15px;
margin-bottom:6px;
border:none;
background:#333;
color:white;
font-size:16px;
border-radius:8px;
}

.activity:hover{
background:#444;
}

.active{
background:#0a84ff;
}

.timer{
font-size:22px;
margin:10px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#222;
padding:10px;
display:flex;
gap:5px;
}

.bottom button{
flex:1;
padding:10px;
border:none;
background:#444;
color:white;
border-radius:6px;
}

#history{
display:none;
padding-bottom:80px;
}

.record{
padding:8px;
border-bottom:1px solid #333;
font-size:14px;
}

</style>

</head>

<body>

<header>
Time Tracker
</header>

<div class="timer" id="timer"></div>

<div class="container" id="activities"></div>

<div class="container" id="history"></div>

<div class="bottom">

<button onclick="showActivities()">Activities</button>

<button onclick="showHistory()">History</button>

<button onclick="addActivity()">Add</button>

<button onclick="exportData()">Export</button>

<button onclick="importData()">Import</button>

</div>

<script>

let state = JSON.parse(localStorage.getItem("timedata")) || {

groups:[
{id:1,name:"Work"},
{id:2,name:"Rest"},
{id:3,name:"Life"},
{id:4,name:"Sleep"}
],

activities:[
{id:1,name:"Coding",group:1},
{id:2,name:"Analysis",group:1},
{id:3,name:"YouTube",group:2},
{id:4,name:"Cooking",group:3},
{id:5,name:"Sleep",group:4}
],

records:[],

active:null

}

function save(){
localStorage.setItem("timedata",JSON.stringify(state))
}

function render(){

let container=document.getElementById("activities")

container.innerHTML=""

state.groups.forEach(g=>{

let div=document.createElement("div")
div.className="group"

let title=document.createElement("div")
title.className="group-title"
title.innerText=g.name

div.appendChild(title)

state.activities
.filter(a=>a.group==g.id)
.forEach(a=>{

let btn=document.createElement("button")
btn.className="activity"
btn.innerText=a.name

if(state.active && state.active.activity==a.id)
btn.classList.add("active")

btn.onclick=()=>startActivity(a.id)

div.appendChild(btn)

})

container.appendChild(div)

})

}

function startActivity(id){

let now=new Date().toISOString()

if(state.active){

state.active.end=now

}

let rec={
id:Date.now(),
activity:id,
start:now,
end:null
}

state.records.push(rec)

state.active=rec

save()

render()

}

function updateTimer(){

if(!state.active){
document.getElementById("timer").innerText=""
return
}

let start=new Date(state.active.start)

let diff=(Date.now()-start)/1000

let h=Math.floor(diff/3600)
let m=Math.floor(diff%3600/60)
let s=Math.floor(diff%60)

document.getElementById("timer").innerText=
"h "+h+" m "+m+" s "+s

}

setInterval(updateTimer,1000)

function showHistory(){

document.getElementById("activities").style.display="none"

let h=document.getElementById("history")

h.style.display="block"

h.innerHTML=""

state.records
.slice()
.reverse()
.forEach(r=>{

let act=state.activities.find(a=>a.id==r.activity)

let div=document.createElement("div")
div.className="record"

div.innerText=
act.name+" | "+
r.start+" → "+
(r.end||"...")

h.appendChild(div)

})

}

function showActivities(){

document.getElementById("history").style.display="none"
document.getElementById("activities").style.display="block"

}

function addActivity(){

let name=prompt("Activity name")

if(!name)return

let group=prompt("Group name")

let g=state.groups.find(x=>x.name==group)

if(!g){

g={
id:Date.now(),
name:group
}

state.groups.push(g)

}

state.activities.push({

id:Date.now(),
name:name,
group:g.id

})

save()

render()

}

function exportData(){

let data=JSON.stringify(state)

let blob=new Blob([data],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="timedata.json"

a.click()

}

function importData(){

let input=document.createElement("input")
input.type="file"

input.onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=()=>{

state=JSON.parse(reader.result)

save()

render()

}

reader.readAsText(file)

}

input.click()

}

render()

</script>

</body>
</html>
