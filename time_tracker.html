<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Time Tracker">
<meta name="theme-color" content="#111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%23111'/><circle cx='96' cy='96' r='60' fill='none' stroke='%230a84ff' stroke-width='8'/><line x1='96' y1='96' x2='96' y2='56' stroke='%230a84ff' stroke-width='6' stroke-linecap='round'/><line x1='96' y1='96' x2='126' y2='96' stroke='%230a84ff' stroke-width='4' stroke-linecap='round'/></svg>">

<title>Time Tracker</title>

<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
font-family:-apple-system,Arial,sans-serif;
margin:0;
background:#111;
color:white;
overflow-x:hidden;
}

body.overlay-open{
overflow:hidden;
position:fixed;
width:100%;
}

header{
padding:15px;
background:#222;
font-size:20px;
text-align:center;
}

/* --- Главный экран --- */

.main-screen{
display:flex;
flex-direction:column;
align-items:center;
padding:20px 10px 120px;
}

.current-activity{
font-size:13px;
color:#0a84ff;
margin-bottom:4px;
min-height:18px;
text-align:center;
padding:0 10px;
}

.timer-display{
font-size:42px;
font-weight:200;
font-variant-numeric:tabular-nums;
letter-spacing:1px;
margin-bottom:20px;
min-height:50px;
}

.buttons-row{
display:flex;
align-items:center;
gap:16px;
margin-bottom:24px;
}

.start-btn{
width:80px;
height:80px;
border-radius:50%;
border:3px solid #0a84ff;
background:none;
color:#0a84ff;
font-size:14px;
font-weight:600;
}

.start-btn:active{background:rgba(10,132,255,0.2)}

.parallel-btn{
width:52px;
height:52px;
border-radius:50%;
border:2px solid #ff9f0a;
background:none;
color:#ff9f0a;
font-size:9px;
font-weight:600;
line-height:1.2;
text-align:center;
padding:4px;
}

.parallel-btn:active{background:rgba(255,159,10,0.2)}

/* --- Recent records (compact format) --- */

.recent-records{
width:100%;
max-width:400px;
}

.rec-row{
display:flex;
align-items:center;
gap:8px;
padding:5px 0;
border-bottom:1px solid rgba(255,255,255,0.06);
font-size:11px;
color:rgba(255,255,255,0.45);
}

.rec-row.cur{color:rgba(255,255,255,0.7)}

.rec-name{
white-space:nowrap;
font-weight:500;
min-width:0;
flex-shrink:1;
overflow:hidden;
text-overflow:ellipsis;
}

.rec-times{
font-size:9px;
line-height:1.3;
white-space:nowrap;
color:inherit;
opacity:0.8;
flex-shrink:0;
}

.rec-dur{
white-space:nowrap;
margin-left:auto;
flex-shrink:0;
font-variant-numeric:tabular-nums;
}

/* --- Рабочий трекер --- */

.work-tracker{
width:100%;
max-width:400px;
margin-top:16px;
padding:12px;
background:#1a1a1a;
border-radius:12px;
}

.week-days{
display:flex;
justify-content:space-around;
margin-bottom:10px;
}

.week-day{
font-size:12px;
color:rgba(255,255,255,0.4);
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

.week-day.today{background:#0a84ff;color:white;font-weight:600}

.work-grid{
display:grid;
grid-template-columns:60px 1fr 50px;
row-gap:6px;
align-items:center;
font-size:13px;
}

.work-lbl{color:rgba(255,255,255,0.5);font-size:12px}
.work-mid{text-align:center;font-variant-numeric:tabular-nums}
.work-right{text-align:right}
.work-pct{color:rgba(255,255,255,0.4);font-size:11px}
.work-target{color:#FF2FFF;font-weight:700}

.work-week-val{
text-decoration:underline;
text-decoration-style:dotted;
text-underline-offset:3px;
cursor:pointer;
}

/* --- Оверлей --- */

.overlay{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.92);
z-index:100;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
overscroll-behavior:contain;
}

.overlay.open{display:block}

.overlay-header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
background:rgba(0,0,0,0.95);
z-index:1;
}

.overlay-header span{font-size:18px}

.overlay-close{
background:none;
border:none;
color:#0a84ff;
font-size:16px;
padding:8px;
}

/* --- Picker inline layout --- */

.picker-hint{
padding:0 15px 8px;
font-size:12px;
color:rgba(255,255,255,0.4);
}

.picker-confirm{
margin:0 15px 20px;
padding:13px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:600;
width:calc(100% - 30px);
text-align:center;
transition:opacity 0.15s;
}

.picker-confirm.single{background:#0a84ff;color:white}
.picker-confirm.parallel{background:#ff9f0a;color:#000}
.picker-confirm.disabled{opacity:0.25;pointer-events:none}

.picker-group{
display:flex;
flex-wrap:wrap;
align-items:center;
gap:6px;
padding:0 15px;
margin-bottom:14px;
}

.picker-group-label{
display:inline-block;
padding:6px 12px;
border:2px solid rgba(255,255,255,0.7);
border-radius:8px;
font-size:13px;
font-weight:600;
color:rgba(255,255,255,0.85);
white-space:nowrap;
}

.activity{
display:inline-block;
padding:7px 13px;
border:none;
background:#222;
color:white;
font-size:14px;
border-radius:8px;
}

.activity:active{background:#333}
.activity.active{background:#0a84ff}
.activity.selected{background:#ff9f0a;color:#000}

/* --- Week detail overlay --- */

.week-detail{padding:15px}

.week-detail-nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.week-detail-nav button{
background:none;
border:none;
color:#0a84ff;
font-size:20px;
padding:8px 12px;
}

.week-detail-dates{font-size:14px;color:rgba(255,255,255,0.7)}

.week-detail-row{
display:grid;
grid-template-columns:30px 1fr 60px;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.06);
font-size:13px;
align-items:center;
}

.week-detail-row .wd-val{text-align:center}
.week-detail-row .wd-pct{text-align:right;color:rgba(255,255,255,0.5)}

.week-detail-total{
margin-top:8px;
padding-top:8px;
border-top:1px solid rgba(255,255,255,0.15);
font-size:14px;
font-weight:600;
display:flex;
justify-content:space-between;
}

/* --- Burger menu --- */

.burger-list{padding:15px}

.burger-item{
display:block;
width:100%;
padding:16px;
margin-bottom:8px;
border:none;
background:#1a1a1a;
color:white;
font-size:15px;
border-radius:10px;
text-align:left;
}

.burger-item:active{background:#222}

.burger-item-desc{
font-size:11px;
color:rgba(255,255,255,0.4);
margin-top:4px;
}

/* --- Add activity form --- */

.form-section{padding:15px}

.form-label{
font-size:12px;
color:rgba(255,255,255,0.5);
margin-bottom:6px;
}

.form-input{
width:100%;
padding:12px;
background:#1a1a1a;
border:1px solid rgba(255,255,255,0.15);
border-radius:8px;
color:white;
font-size:15px;
margin-bottom:16px;
}

.form-input:focus{outline:none;border-color:#0a84ff}

.form-existing-groups{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:16px;
}

.form-group-chip{
padding:6px 12px;
border:1px solid rgba(255,255,255,0.25);
border-radius:8px;
background:none;
color:rgba(255,255,255,0.7);
font-size:13px;
}

.form-group-chip.picked{border-color:#0a84ff;color:#0a84ff}
.form-group-chip:active{background:rgba(255,255,255,0.05)}

.form-submit{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a84ff;
color:white;
font-size:15px;
font-weight:600;
}

.form-submit.disabled{opacity:0.25;pointer-events:none}

/* --- Retro entry --- */

.retro-section{padding:15px}

.retro-mode-row{
display:flex;
gap:8px;
margin-bottom:16px;
}

.retro-mode-btn{
flex:1;
padding:10px;
border:1px solid rgba(255,255,255,0.2);
border-radius:8px;
background:none;
color:rgba(255,255,255,0.5);
font-size:13px;
text-align:center;
}

.retro-mode-btn.active{border-color:#0a84ff;color:#0a84ff}

.retro-time-row{
display:flex;
gap:10px;
margin-bottom:16px;
align-items:center;
}

.retro-time-row label{
font-size:12px;
color:rgba(255,255,255,0.5);
min-width:28px;
}

.retro-time-row input[type="date"],
.retro-time-row input[type="time"]{
padding:10px;
background:#1a1a1a;
border:1px solid rgba(255,255,255,0.15);
border-radius:8px;
color:white;
font-size:15px;
-webkit-appearance:none;
flex:1;
}

.retro-time-row input:focus{outline:none;border-color:#0a84ff}

.retro-act-label{
font-size:12px;
color:rgba(255,255,255,0.5);
margin-bottom:8px;
}

.retro-picker{margin-bottom:16px}

/* --- JSON viewer --- */

.json-view{
padding:15px;
font-size:12px;
white-space:pre-wrap;
word-break:break-all;
color:rgba(255,255,255,0.7);
font-family:monospace;
max-height:calc(100vh - 80px);
overflow-y:auto;
}

/* --- Нижняя панель --- */

.bottom{
position:fixed;
bottom:0;left:0;right:0;
background:#222;
padding:10px 10px;
padding-bottom:calc(10px + env(safe-area-inset-bottom));
display:flex;
gap:5px;
z-index:50;
}

.bottom button{
flex:1;
padding:10px 4px;
border:none;
background:#333;
color:white;
border-radius:6px;
font-size:13px;
}

/* --- Лог задач (история) --- */

#history{
display:none;
padding:10px;
padding-bottom:120px;
}

.day-separator{
font-size:14px;
font-weight:700;
padding:12px 0 6px;
margin-top:8px;
color:rgba(255,255,255,0.8);
}

.day-separator:last-of-type{margin-top:0}

.record{
display:flex;
align-items:center;
gap:8px;
padding:5px 0;
border-bottom:1px solid rgba(255,255,255,0.06);
font-size:12px;
color:rgba(255,255,255,0.8);
}

.rec-name{
white-space:nowrap;
font-weight:500;
min-width:0;
flex-shrink:1;
overflow:hidden;
text-overflow:ellipsis;
}

.rec-times{
font-size:9px;
line-height:1.3;
white-space:nowrap;
opacity:0.7;
flex-shrink:0;
}

.rec-dur{
white-space:nowrap;
margin-left:auto;
flex-shrink:0;
font-variant-numeric:tabular-nums;
}

</style>

</head>

<body>

<header>Учёт времени</header>

<div class="main-screen" id="main">
  <div class="current-activity" id="currentActivity"></div>
  <div class="timer-display" id="timer">00:00:00</div>
  <div class="buttons-row">
    <button class="start-btn" onclick="openPicker(false)">ПУСК</button>
    <button class="parallel-btn" onclick="openPicker(true)">ПУСК<br>×2</button>
  </div>
  <div class="recent-records" id="recentRecords"></div>
  <div class="work-tracker">
    <div class="week-days" id="weekDays"></div>
    <div class="work-grid">
      <span class="work-lbl">Сегодня</span>
      <span class="work-mid" id="workToday">0ч 0м</span>
      <span class="work-right"><span class="work-target">10ч</span> <span class="work-pct" id="workTodayPct"></span></span>
      <span class="work-lbl">Неделя</span>
      <span class="work-mid"><span class="work-week-val" id="workWeek" onclick="openWeekDetail(0)">0ч 0м</span></span>
      <span class="work-right"><span class="work-target">70ч</span> <span class="work-pct" id="workWeekPct"></span></span>
    </div>
  </div>
</div>

<!-- Picker -->
<div class="overlay" id="picker">
  <div class="overlay-header">
    <span id="pickerTitle">Задача</span>
    <button class="overlay-close" onclick="closePicker()">Закрыть</button>
  </div>
  <div class="picker-hint" id="pickerHint">Выберите 1 задачу</div>
  <button class="picker-confirm single disabled" id="pickerConfirm" onclick="confirmPicker()">Запустить</button>
  <div id="pickerList"></div>
</div>

<!-- Week detail -->
<div class="overlay" id="weekOverlay">
  <div class="overlay-header">
    <span>Рабочие часы</span>
    <button class="overlay-close" onclick="closeWeekDetail()">Закрыть</button>
  </div>
  <div class="week-detail" id="weekDetail"></div>
</div>

<!-- Burger -->
<div class="overlay" id="burgerOverlay">
  <div class="overlay-header">
    <span>Меню</span>
    <button class="overlay-close" onclick="closeBurger()">Закрыть</button>
  </div>
  <div class="burger-list">
    <button class="burger-item" onclick="closeBurger();openAddActivity()">
      Добавить задачу
      <div class="burger-item-desc">Новая задача и/или группа</div>
    </button>
    <button class="burger-item" onclick="closeBurger();openRetroEntry()">
      Запись задним числом
      <div class="burger-item-desc">Вставить запись в прошлом</div>
    </button>
    <button class="burger-item" onclick="closeBurger();checkUpdate()">
      Обновить кеш
      <div class="burger-item-desc">Сбросить кеш и перезагрузить</div>
    </button>
    <button class="burger-item" onclick="closeBurger();openJsonView()">
      Просмотр JSON
      <div class="burger-item-desc">Задачи, группы и лог</div>
    </button>
    <button class="burger-item" onclick="closeBurger();exportData()">
      Экспорт JSON
      <div class="burger-item-desc">Скачать файл данных</div>
    </button>
    <button class="burger-item" onclick="closeBurger();importData()">
      Импорт JSON
      <div class="burger-item-desc">Загрузить из файла</div>
    </button>
  </div>
</div>

<!-- Add activity -->
<div class="overlay" id="addActivityOverlay">
  <div class="overlay-header">
    <span>Новая задача</span>
    <button class="overlay-close" onclick="closeAddActivity()">Закрыть</button>
  </div>
  <div class="form-section">
    <div class="form-label">Название задачи</div>
    <input class="form-input" id="newActName" placeholder="Например: Чтение">
    <div class="form-label">Группа — выберите или создайте</div>
    <div class="form-existing-groups" id="existingGroups"></div>
    <input class="form-input" id="newGroupName" placeholder="Или введите новую группу">
    <button class="form-submit" id="addActSubmit" onclick="submitAddActivity()">Добавить</button>
  </div>
</div>

<!-- Retro entry -->
<div class="overlay" id="retroOverlay">
  <div class="overlay-header">
    <span>Запись задним числом</span>
    <button class="overlay-close" onclick="closeRetro()">Закрыть</button>
  </div>
  <div class="retro-section">
    <div class="retro-mode-row">
      <button class="retro-mode-btn active" id="retroModeSingle" onclick="setRetroMode('single')">Единственная</button>
      <button class="retro-mode-btn" id="retroModeParallel" onclick="setRetroMode('parallel')">Параллельная</button>
    </div>
    <div class="retro-time-row">
      <label>С</label>
      <input type="date" id="retroStartDate">
      <input type="time" id="retroStartTime">
    </div>
    <div class="retro-time-row">
      <label>До</label>
      <input type="date" id="retroEndDate">
      <input type="time" id="retroEndTime">
    </div>
    <div class="retro-act-label">Выберите задачу</div>
    <div class="retro-picker" id="retroPicker"></div>
    <button class="form-submit" id="retroSubmit" onclick="submitRetro()">Вставить запись</button>
  </div>
</div>

<!-- JSON viewer -->
<div class="overlay" id="jsonOverlay">
  <div class="overlay-header">
    <span>Данные JSON</span>
    <button class="overlay-close" onclick="closeJsonView()">Закрыть</button>
  </div>
  <div class="json-view" id="jsonContent"></div>
</div>

<div id="history"></div>

<div class="bottom">
  <button onclick="showMain()">Главная</button>
  <button onclick="showHistory()">Лог задач</button>
  <button onclick="openBurger()">☰</button>
</div>

<script>

// --- Scroll lock ---
let scrollY=0;
function lockScroll(){
  scrollY=window.scrollY;
  document.body.classList.add('overlay-open');
  document.body.style.top=-scrollY+'px';
}
function unlockScroll(){
  document.body.classList.remove('overlay-open');
  document.body.style.top='';
  window.scrollTo(0,scrollY);
}

// --- IndexedDB ---
const DB_NAME='timetracker', DB_STORE='state';
function dbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=()=>r.result.createObjectStore(DB_STORE);
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
function dbSave(d){
  return dbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put(d,'main');
    tx.oncomplete=()=>{db.close();res()};
    tx.onerror=()=>{db.close();rej(tx.error)};
  }));
}
function dbLoad(){
  return dbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readonly');
    const r=tx.objectStore(DB_STORE).get('main');
    r.onsuccess=()=>{db.close();res(r.result||null)};
    r.onerror=()=>{db.close();rej(r.error)};
  }));
}

// --- Cache update ---
function checkUpdate(){
  caches.keys().then(k=>Promise.all(k.map(x=>caches.delete(x)))).then(()=>{
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.getRegistration().then(r=>{
        if(r)r.unregister().then(()=>location.reload());
        else location.reload();
      });
    } else location.reload();
  });
}

// --- SW ---
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    setInterval(()=>reg.update(),30000);
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{if(nw.state==='activated')location.reload()});
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
}
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist();

// --- State ---
const DEFAULT_STATE={
  groups:[{id:1,name:"Работа"},{id:2,name:"Отдых"},{id:3,name:"Быт"},{id:4,name:"Сон"}],
  activities:[{id:1,name:"Кодинг",group:1},{id:2,name:"Анализ",group:1},{id:3,name:"YouTube",group:2},{id:4,name:"Готовка",group:3},{id:5,name:"Сон",group:4}],
  records:[],
  active:[]
};
let state=DEFAULT_STATE;

const DAY_NAMES=['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
const WORK_GROUP_NAME='Работа';

// --- Helpers ---
function mskNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Moscow'}))}
function mskDayStartUTC(y,m,d){return new Date(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}T00:00:00+03:00`).getTime()}
function getMondayMSK(mskD){const d=new Date(mskD);let dow=d.getDay();if(dow===0)dow=7;d.setDate(d.getDate()-(dow-1));d.setHours(0,0,0,0);return d}

function toMSK(iso){
  if(!iso)return '...';
  return new Date(iso).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Moscow'});
}
function mskDateObj(iso){
  return new Date(new Date(iso).toLocaleString('en-US',{timeZone:'Europe/Moscow'}));
}
function toMSKDateStr(iso){
  if(!iso)return '';
  const d=mskDateObj(iso);
  const dow=d.getDay();
  return DAY_NAMES[dow===0?6:dow-1]+' | '+String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');
}
function mskDayKey(iso){
  const d=mskDateObj(iso);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function mskDayLabel(iso){
  const d=mskDateObj(iso);
  const dow=d.getDay();
  return DAY_NAMES[dow===0?6:dow-1]+' | '+String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
}
function formatTimeShort(iso){return iso?toMSK(iso)+' ('+toMSKDateStr(iso)+')':'...'}

function hmFromMs(ms){
  if(ms<=0)return '0м';
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);
  if(h>0&&m>0)return h+'ч '+m+'м';
  if(h>0)return h+'ч 0м';
  return m+'м';
}

function durationStr(ms){return hmFromMs(ms)}

function getAct(id){return state.activities.find(x=>x.id==id)}
function getActName(id){const a=getAct(id);return a?a.name:'?'}
function getGrpName(actId){const a=getAct(actId);if(!a)return'?';const g=state.groups.find(x=>x.id==a.group);return g?g.name:'?'}
function isWork(actId){const a=getAct(actId);if(!a)return false;const g=state.groups.find(x=>x.id==a.group);return g&&g.name===WORK_GROUP_NAME}

function getActive(){return state.records.filter(r=>r.end===null)}
function closeAll(now){state.records.forEach(r=>{if(r.end===null)r.end=now});state.active=[]}

function calcWorkMs(from,to){
  const iv=[];
  state.records.forEach(r=>{
    if(!isWork(r.activity))return;
    const rs=new Date(r.start).getTime(),re=r.end?new Date(r.end).getTime():Date.now();
    const s=Math.max(rs,from),e=Math.min(re,to);
    if(e>s)iv.push([s,e]);
  });
  if(!iv.length)return 0;
  iv.sort((a,b)=>a[0]-b[0]);
  const mg=[[...iv[0]]];
  for(let i=1;i<iv.length;i++){const l=mg[mg.length-1];if(iv[i][0]<=l[1])l[1]=Math.max(l[1],iv[i][1]);else mg.push([...iv[i]])}
  let t=0;mg.forEach(x=>t+=x[1]-x[0]);return t;
}

// --- Split records at MSK midnight boundaries ---
function splitAtMidnights(records){
  const result=[];
  records.forEach(r=>{
    if(!r.end){result.push(r);return}
    let cs=new Date(r.start).getTime();
    const ce=new Date(r.end).getTime();
    while(cs<ce){
      const msk=mskDateObj(new Date(cs).toISOString());
      const nextDay=new Date(msk);
      nextDay.setDate(nextDay.getDate()+1);nextDay.setHours(0,0,0,0);
      // Next midnight in UTC
      const midnightUTC=mskDayStartUTC(nextDay.getFullYear(),nextDay.getMonth()+1,nextDay.getDate());
      if(midnightUTC>=ce){
        result.push({...r,start:new Date(cs).toISOString(),end:new Date(ce).toISOString()});
        cs=ce;
      } else {
        result.push({...r,id:r.id+Math.random(),start:new Date(cs).toISOString(),end:new Date(midnightUTC).toISOString()});
        cs=midnightUTC;
      }
    }
  });
  return result;
}

function migrateState(d){if(d.active&&!Array.isArray(d.active))d.active=[];else if(!d.active)d.active=[];return d}

// --- Init ---
(async function(){
  let d=null;
  try{d=await dbLoad()}catch(e){}
  if(!d){const ls=localStorage.getItem("timedata");if(ls){d=JSON.parse(ls);try{await dbSave(d)}catch(e){}}}
  state=d?migrateState(d):DEFAULT_STATE;
  state.active=state.records.filter(r=>r.end===null).map(r=>r.id);
  renderMain();updateTimer();updateWorkTracker();
})();

function save(){
  state.active=state.records.filter(r=>r.end===null).map(r=>r.id);
  localStorage.setItem("timedata",JSON.stringify(state));
  dbSave(state).catch(()=>{});
}

// --- Build record row HTML element ---
function buildRecRow(r, isCurrent){
  const row=document.createElement('div');
  row.className='rec-row'+(isCurrent?' cur':'');

  const name=document.createElement('span');
  name.className='rec-name';
  name.innerText=getGrpName(r.activity)+' | '+getActName(r.activity);

  const times=document.createElement('span');
  times.className='rec-times';
  times.innerHTML='с '+toMSK(r.start)+'<br>до '+(r.end?toMSK(r.end):'...');

  const dur=document.createElement('span');
  dur.className='rec-dur';
  const ms=r.end?(new Date(r.end)-new Date(r.start)):0;
  dur.innerText=r.end?durationStr(ms):'...';

  row.appendChild(name);
  row.appendChild(times);
  row.appendChild(dur);
  return row;
}

// --- Picker list ---
function renderInlinePicker(container, selected, parallel, onSelect){
  container.innerHTML='';
  state.groups.forEach(g=>{
    const row=document.createElement('div');
    row.className='picker-group';
    const label=document.createElement('span');
    label.className='picker-group-label';
    label.innerText=g.name;
    row.appendChild(label);
    state.activities.filter(a=>a.group==g.id).forEach(a=>{
      const btn=document.createElement('button');
      btn.className='activity';
      btn.innerText=a.name;
      if(selected.includes(a.id))btn.classList.add(parallel?'selected':'active');
      btn.onclick=()=>onSelect(a.id);
      row.appendChild(btn);
    });
    container.appendChild(row);
  });
}

// --- Picker ---
let pickerParallel=false, pickerSelected=[];

function openPicker(parallel){
  pickerParallel=parallel;pickerSelected=[];
  document.getElementById('pickerTitle').innerText=parallel?'Параллельные задачи':'Задача';
  document.getElementById('pickerHint').innerText=parallel?'Выберите 2 задачи':'Выберите 1 задачу';
  updateConfirmBtn();
  renderInlinePicker(document.getElementById('pickerList'),pickerSelected,parallel,onPickerSelect);
  lockScroll();
  document.getElementById('picker').classList.add('open');
}

function onPickerSelect(actId){
  const max=pickerParallel?2:1;
  const idx=pickerSelected.indexOf(actId);
  if(idx>=0)pickerSelected.splice(idx,1);
  else if(pickerSelected.length>=max){if(!pickerParallel)pickerSelected=[actId];else return}
  else pickerSelected.push(actId);
  updateConfirmBtn();
  renderInlinePicker(document.getElementById('pickerList'),pickerSelected,pickerParallel,onPickerSelect);
}

function updateConfirmBtn(){
  const btn=document.getElementById('pickerConfirm');
  const ready=pickerParallel?pickerSelected.length===2:pickerSelected.length===1;
  btn.className='picker-confirm '+(pickerParallel?'parallel':'single')+(ready?'':' disabled');
  if(!pickerSelected.length)btn.innerText='Запустить';
  else if(pickerParallel&&pickerSelected.length===2)btn.innerText='Запустить: '+getActName(pickerSelected[0])+' + '+getActName(pickerSelected[1]);
  else if(pickerParallel)btn.innerText='Запустить: '+getActName(pickerSelected[0])+' + ...';
  else btn.innerText='Запустить: '+getActName(pickerSelected[0]);
}

function confirmPicker(){
  const ready=pickerParallel?pickerSelected.length===2:pickerSelected.length===1;
  if(!ready)return;
  const now=new Date().toISOString();
  closeAll(now);
  const ts=Date.now();
  pickerSelected.forEach((id,i)=>{state.records.push({id:ts+i,activity:id,start:now,end:null})});
  save();renderMain();closePicker();
}

function closePicker(){document.getElementById('picker').classList.remove('open');unlockScroll()}

// --- Main screen ---
function renderMain(){
  const cur=document.getElementById('currentActivity');
  const active=getActive();
  if(active.length>1)cur.innerText=active.map(r=>getGrpName(r.activity)+' | '+getActName(r.activity)).join('  +  ');
  else if(active.length===1)cur.innerText=getGrpName(active[0].activity)+' | '+getActName(active[0].activity);
  else cur.innerText='Нет активности';

  const c=document.getElementById('recentRecords');c.innerHTML='';
  active.forEach(r=>c.appendChild(buildRecRow(r,true)));
  state.records.filter(r=>r.end!==null).slice(-3).reverse().forEach(r=>c.appendChild(buildRecRow(r,false)));
  renderWeekDays();
}

function renderWeekDays(){
  const el=document.getElementById('weekDays');el.innerHTML='';
  const now=mskNow();let dow=now.getDay();if(dow===0)dow=7;
  for(let i=1;i<=7;i++){const d=document.createElement('div');d.className='week-day';d.innerText=DAY_NAMES[i-1];if(i===dow)d.classList.add('today');el.appendChild(d)}
}

function updateWorkTracker(){
  const now=mskNow();
  const ts=mskDayStartUTC(now.getFullYear(),now.getMonth()+1,now.getDate());
  const todayMs=calcWorkMs(ts,ts+86400000);
  document.getElementById('workToday').innerText=hmFromMs(todayMs);
  document.getElementById('workTodayPct').innerText=(todayMs/36000000*100).toFixed(1)+'%';

  const mon=getMondayMSK(now);
  const ws=mskDayStartUTC(mon.getFullYear(),mon.getMonth()+1,mon.getDate());
  const weekMs=calcWorkMs(ws,ws+604800000);
  document.getElementById('workWeek').innerText=hmFromMs(weekMs);
  document.getElementById('workWeekPct').innerText=(weekMs/252000000*100).toFixed(1)+'%';
}

function updateTimer(){
  const el=document.getElementById('timer');
  const active=getActive();
  if(!active.length){el.innerText='00:00:00';updateWorkTracker();return}
  const earliest=Math.min(...active.map(r=>new Date(r.start).getTime()));
  const diff=(Date.now()-earliest)/1000;
  const h=Math.floor(diff/3600),m=Math.floor(diff%3600/60),s=Math.floor(diff%60);
  el.innerText=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  updateWorkTracker();
}
setInterval(updateTimer,1000);

// --- Week detail ---
let weekDetailOffset=0;
function openWeekDetail(o){weekDetailOffset=o||0;renderWeekDetail();lockScroll();document.getElementById('weekOverlay').classList.add('open')}
function closeWeekDetail(){document.getElementById('weekOverlay').classList.remove('open');unlockScroll()}
function renderWeekDetail(){
  const c=document.getElementById('weekDetail');const now=mskNow();
  const mon=getMondayMSK(now);mon.setDate(mon.getDate()+weekDetailOffset*7);
  const ws=mskDayStartUTC(mon.getFullYear(),mon.getMonth()+1,mon.getDate());
  const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  const fmt=d=>String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');
  let h='<div class="week-detail-nav"><button onclick="weekDetailOffset--;renderWeekDetail()">‹</button><span class="week-detail-dates">'+fmt(mon)+' — '+fmt(sun)+'</span>';
  h+=weekDetailOffset<0?'<button onclick="weekDetailOffset++;renderWeekDetail()">›</button>':'<button style="visibility:hidden">›</button>';
  h+='</div>';
  let tot=0;
  for(let i=0;i<7;i++){
    const ds=ws+i*86400000,ms=calcWorkMs(ds,ds+86400000);tot+=ms;
    h+='<div class="week-detail-row"><span>'+DAY_NAMES[i]+'</span><span class="wd-val">'+hmFromMs(ms)+'</span><span class="wd-pct">+'+(ms/36000000*100).toFixed(1)+'%</span></div>';
  }
  h+='<div class="week-detail-total"><span>Итого</span><span>'+hmFromMs(tot)+' / <span class="work-target">70ч</span> ('+(tot/252000000*100).toFixed(1)+'%)</span></div>';
  c.innerHTML=h;
}

// --- Burger ---
function openBurger(){lockScroll();document.getElementById('burgerOverlay').classList.add('open')}
function closeBurger(){document.getElementById('burgerOverlay').classList.remove('open');unlockScroll()}

// --- Add Activity ---
let pickedGroupId=null;
function openAddActivity(){
  pickedGroupId=null;
  document.getElementById('newActName').value='';
  document.getElementById('newGroupName').value='';
  const gc=document.getElementById('existingGroups');gc.innerHTML='';
  state.groups.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='form-group-chip';
    btn.innerText=g.name;
    btn.onclick=()=>{
      pickedGroupId=g.id;
      document.getElementById('newGroupName').value='';
      gc.querySelectorAll('.form-group-chip').forEach(b=>b.classList.remove('picked'));
      btn.classList.add('picked');
    };
    gc.appendChild(btn);
  });
  lockScroll();document.getElementById('addActivityOverlay').classList.add('open');
}
function closeAddActivity(){document.getElementById('addActivityOverlay').classList.remove('open');unlockScroll()}

function submitAddActivity(){
  const name=document.getElementById('newActName').value.trim();
  if(!name)return;
  const newGrp=document.getElementById('newGroupName').value.trim();
  let gId=pickedGroupId;
  if(newGrp){
    let g=state.groups.find(x=>x.name===newGrp);
    if(!g){g={id:Date.now(),name:newGrp};state.groups.push(g)}
    gId=g.id;
  }
  if(!gId)return;
  state.activities.push({id:Date.now()+1,name:name,group:gId});
  save();closeAddActivity();
}

// --- Retro entry ---
let retroMode='single', retroActId=null;

function openRetroEntry(){
  retroMode='single';retroActId=null;
  document.getElementById('retroModeSingle').classList.add('active');
  document.getElementById('retroModeParallel').classList.remove('active');
  const now=mskNow();
  const h1=new Date(now.getTime()-3600000);
  document.getElementById('retroStartDate').value=fmtDateVal(h1);
  document.getElementById('retroStartTime').value=fmtTimeVal(h1);
  document.getElementById('retroEndDate').value=fmtDateVal(now);
  document.getElementById('retroEndTime').value=fmtTimeVal(now);
  renderRetroPicker();
  lockScroll();document.getElementById('retroOverlay').classList.add('open');
}
function closeRetro(){document.getElementById('retroOverlay').classList.remove('open');unlockScroll()}

function fmtDateVal(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtTimeVal(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

function setRetroMode(m){
  retroMode=m;retroActId=null;
  document.getElementById('retroModeSingle').classList.toggle('active',m==='single');
  document.getElementById('retroModeParallel').classList.toggle('active',m==='parallel');
  renderRetroPicker();
}

function renderRetroPicker(){
  const c=document.getElementById('retroPicker');
  renderInlinePicker(c,[retroActId].filter(Boolean),false,id=>{retroActId=id;renderRetroPicker()});
}

function submitRetro(){
  if(!retroActId)return;
  const sd=document.getElementById('retroStartDate').value;
  const st=document.getElementById('retroStartTime').value;
  const ed=document.getElementById('retroEndDate').value;
  const et=document.getElementById('retroEndTime').value;
  if(!sd||!st||!ed||!et)return;

  const startISO=sd+'T'+st+':00+03:00';
  const endISO=ed+'T'+et+':00+03:00';
  const startMs=new Date(startISO).getTime();
  const endMs=new Date(endISO).getTime();
  if(endMs<=startMs)return;

  if(retroMode==='single'){
    insertRecordSingle(retroActId, new Date(startMs).toISOString(), new Date(endMs).toISOString());
  } else {
    state.records.push({id:Date.now(),activity:retroActId,start:new Date(startMs).toISOString(),end:new Date(endMs).toISOString()});
    state.records.sort((a,b)=>new Date(a.start)-new Date(b.start));
  }
  save();renderMain();closeRetro();
}

function insertRecordSingle(actId, startISO, endISO){
  const ns=new Date(startISO).getTime(), ne=new Date(endISO).getTime();
  const newRecs=[];
  state.records.forEach(r=>{
    const rs=new Date(r.start).getTime();
    const re=r.end?new Date(r.end).getTime():null;
    if(re===null){
      if(rs<ns){
        newRecs.push({...r, end:startISO, id:r.id});
        newRecs.push({...r, id:Date.now()+Math.random()*1000|0, start:endISO, end:null});
      } else if(rs>=ns && rs<ne){
        newRecs.push({...r, start:endISO});
      } else {
        newRecs.push(r);
      }
      return;
    }
    if(re<=ns || rs>=ne){newRecs.push(r);return}
    if(rs<ns) newRecs.push({...r, end:startISO});
    if(re>ne) newRecs.push({...r, id:Date.now()+Math.random()*1000|0, start:endISO, end:r.end});
  });
  newRecs.push({id:Date.now(),activity:actId,start:startISO,end:endISO});
  newRecs.sort((a,b)=>new Date(a.start)-new Date(b.start));
  const merged=[];
  newRecs.forEach(r=>{
    const last=merged[merged.length-1];
    if(last && last.activity===r.activity && last.end===r.start){last.end=r.end}
    else merged.push({...r});
  });
  state.records=merged;
}

// --- JSON viewer ---
function openJsonView(){
  document.getElementById('jsonContent').innerText=JSON.stringify({groups:state.groups,activities:state.activities,records:state.records},null,2);
  lockScroll();document.getElementById('jsonOverlay').classList.add('open');
}
function closeJsonView(){document.getElementById('jsonOverlay').classList.remove('open');unlockScroll()}

// --- Navigation ---
function showMain(){
  document.getElementById('main').style.display='flex';
  document.getElementById('history').style.display='none';
  renderMain();
}

function showHistory(){
  document.getElementById('main').style.display='none';
  const h=document.getElementById('history');h.style.display='block';h.innerHTML='';

  // Split records at midnight boundaries for display
  const display=splitAtMidnights(state.records);
  // Also add active records (end=null) as-is
  // Group by MSK day, newest first
  const byDay={};
  display.forEach(r=>{
    const key=mskDayKey(r.start);
    if(!byDay[key])byDay[key]=[];
    byDay[key].push(r);
  });
  // Also add active records
  getActive().forEach(r=>{
    const key=mskDayKey(r.start);
    if(!byDay[key])byDay[key]=[];
    // Only add if not already present (splitAtMidnights passes them through)
    if(!byDay[key].find(x=>x.id===r.id))byDay[key].push(r);
  });

  const sortedDays=Object.keys(byDay).sort().reverse();
  sortedDays.forEach(day=>{
    const label=document.createElement('div');
    label.className='day-separator';
    label.innerText=mskDayLabel(byDay[day][0].start);
    h.appendChild(label);
    byDay[day].sort((a,b)=>new Date(b.start)-new Date(a.start)).forEach(r=>{
      h.appendChild(buildRecRow(r,r.end===null));
    });
  });
}

function exportData(){
  const b=new Blob([JSON.stringify(state)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='timedata.json';a.click();
}

function importData(){
  const inp=document.createElement('input');inp.type='file';
  inp.onchange=e=>{
    const rd=new FileReader();
    rd.onload=()=>{state=migrateState(JSON.parse(rd.result));state.active=state.records.filter(r=>r.end===null).map(r=>r.id);save();renderMain()};
    rd.readAsText(e.target.files[0]);
  };
  inp.click();
}
