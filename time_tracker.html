<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Time Tracker">
<meta name="theme-color" content="#111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%23111'/><circle cx='96' cy='96' r='60' fill='none' stroke='%230a84ff' stroke-width='8'/><line x1='96' y1='96' x2='96' y2='56' stroke='%230a84ff' stroke-width='6' stroke-linecap='round'/><line x1='96' y1='96' x2='126' y2='96' stroke='%230a84ff' stroke-width='4' stroke-linecap='round'/></svg>">

<title>Time Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
font-family:-apple-system,Arial,sans-serif;
margin:0;
background:#111;
color:white;
overflow-x:hidden;
}

body.overlay-open{
overflow:hidden;
position:fixed;
width:100%;
}

header{
padding:15px;
background:#222;
font-size:20px;
text-align:center;
}

/* =============================================
   ГЛАВНЫЙ ЭКРАН
   ============================================= */

.main-screen{
display:flex;
flex-direction:column;
align-items:center;
padding:20px 10px 140px;
}

/* Рамка вокруг названия задачи + крупного таймера */
.timer-box{
border:1px solid rgba(255,255,255,0.25);
border-radius:16px;
padding:12px 24px 14px;
margin-bottom:20px;
display:inline-flex;
flex-direction:column;
align-items:center;
}

/* Название текущей задачи (синий текст) */
.current-activity{
font-size:13px;
color:#0a84ff;
margin-bottom:4px;
min-height:18px;
text-align:center;
}

/* Крупный таймер (ххч ххм ххс) */
.timer-display{
font-size:38px;
font-weight:200;
font-variant-numeric:tabular-nums;
letter-spacing:0.5px;
min-height:46px;
}

/* Кнопки ПУСК и ПУСК ×2 */
.buttons-row{
display:flex;
align-items:center;
gap:16px;
margin-bottom:24px;
}

.start-btn{
width:80px;
height:80px;
border-radius:50%;
border:3px solid #0a84ff;
background:none;
color:#0a84ff;
font-size:14px;
font-weight:600;
}

.start-btn:active{background:rgba(10,132,255,0.2)}

.parallel-btn{
width:52px;
height:52px;
border-radius:50%;
border:2px solid #ff9f0a;
background:none;
color:#ff9f0a;
font-size:9px;
font-weight:600;
line-height:1.2;
text-align:center;
padding:4px;
}

.parallel-btn:active{background:rgba(255,159,10,0.2)}

/* =============================================
   СТРОКИ ЗАПИСЕЙ (лог на главной + окно "Лог задач")
   Столбцы: дата | название | время от—до | длительность
   ============================================= */

.recent-records{
width:100%;
max-width:400px;
}

.rec-row{
display:flex;
align-items:center;
padding:8px 10px;
border:1px solid rgba(255,255,255,0.12);
border-radius:8px;
margin-bottom:4px;
font-size:13px;
color:rgba(255,255,255,0.45);
cursor:pointer;
}

.rec-note-icon{
font-size:11px;
margin-left:4px;
flex-shrink:0;
}
.rec-note-icon.red{color:#ff453a}
.rec-note-icon.green{color:#30d158}
.rec-note-icon.white{color:rgba(255,255,255,0.7)}
.rec-note-icon.hidden{display:none}

.note-section{padding:15px}
.note-info{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:12px}
#noteText{
width:100%;
min-height:120px;
padding:12px;
background:#1a1a1a;
border:1px solid rgba(255,255,255,0.15);
border-radius:8px;
color:white;
font-size:15px;
font-family:inherit;
resize:vertical;
}
#noteText:focus{outline:none;border-color:#0a84ff}

.rec-row.cur{color:rgba(255,255,255,0.7)}

/* Столбец 1: дата (ПН 18.03) */
.rec-date{
font-size:9px;
opacity:0.6;
white-space:nowrap;
margin-right:8px;
}

/* Столбец 2: группа | задача */
.rec-name{
white-space:nowrap;
font-weight:500;
min-width:0;
overflow:hidden;
text-overflow:ellipsis;
flex:1;
}

/* Столбец 3: время от — до */
.rec-times{
font-size:10px;
white-space:nowrap;
margin:0 8px;
min-width:90px;
flex-shrink:0;
text-align:center;
}

.rec-times b{font-weight:600}

/* Столбец 4: длительность (у активной — live-счётчик) */
.rec-dur{
white-space:nowrap;
font-variant-numeric:tabular-nums;
font-weight:600;
text-align:right;
min-width:62px;
flex-shrink:0;
}

.rec-dur.live{color:#0a84ff}

/* =============================================
   РАБОЧИЙ ТРЕКЕР (виджет на главной)
   Дни недели ПН—ВС + каунтеры Сегодня/Неделя
   ============================================= */

.work-tracker{
width:100%;
max-width:400px;
margin-top:16px;
padding:12px;
background:#1a1a1a;
border-radius:12px;
}

.week-days{
display:flex;
justify-content:space-around;
margin-bottom:10px;
}

.week-day{
font-size:12px;
color:rgba(255,255,255,0.4);
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

.week-day.today{background:#0a84ff;color:white;font-weight:600}

/* Каунтеры рабочих часов: Сегодня/Неделя | значение | из | цель | % */
.work-grid{
display:grid;
grid-template-columns:56px auto 18px auto auto;
justify-content:center;
row-gap:6px;
column-gap:14px;
align-items:center;
font-size:13px;
}

.work-lbl{color:rgba(255,255,255,0.5);font-size:12px}
.work-val{font-variant-numeric:tabular-nums}
.work-from{color:rgba(255,255,255,0.35);font-size:11px}
.work-tgt{}
.work-target{color:#FF2FFF;font-weight:700}
.work-pctcol{text-align:right;color:rgba(255,255,255,0.4);font-size:11px}

.work-week-val{
text-decoration:underline;
text-decoration-style:dotted;
text-underline-offset:3px;
cursor:pointer;
}

/* =============================================
   ОВЕРЛЕИ (общие стили для всех всплывающих окон)
   ============================================= */

.overlay{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.92);
z-index:100;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
overscroll-behavior:contain;
}

.overlay.open{display:block}

.overlay-header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
background:rgba(0,0,0,0.95);
z-index:1;
}

.overlay-header span{font-size:18px}

.overlay-close{
background:none;
border:none;
color:#0a84ff;
font-size:16px;
padding:8px;
}

/* =============================================
   ПИКЕР ЗАДАЧ (выбор задачи при ПУСК / ПУСК ×2)
   ============================================= */

.picker-hint{
padding:0 15px 8px;
font-size:12px;
color:rgba(255,255,255,0.4);
}

.picker-confirm{
margin:0 15px 20px;
padding:13px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:600;
width:calc(100% - 30px);
text-align:center;
transition:opacity 0.15s;
}

.picker-confirm.single{background:#0a84ff;color:white}
.picker-confirm.parallel{background:#ff9f0a;color:#000}
.picker-confirm.disabled{opacity:0.25;pointer-events:none}

.picker-group{
display:flex;
flex-wrap:wrap;
align-items:center;
gap:6px;
padding:0 15px;
margin-bottom:14px;
}

.picker-group-label{
display:inline-block;
padding:6px 12px;
border:2px solid rgba(255,255,255,0.7);
border-radius:8px;
font-size:13px;
font-weight:600;
color:rgba(255,255,255,0.85);
white-space:nowrap;
}

.activity{
display:inline-block;
padding:7px 13px;
border:none;
background:#222;
color:white;
font-size:14px;
border-radius:8px;
}

.activity:active{background:#333}
.activity.active{background:#0a84ff}
.activity.selected{background:#ff9f0a;color:#000}

/* =============================================
   ОКНО "РАБОЧИЕ ЧАСЫ" (детализация по дням недели)
   Столбцы: день | часы | из цель | %
   ============================================= */

.week-detail{padding:15px}

.week-detail-nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.week-detail-nav button{
background:none;
border:none;
color:#0a84ff;
font-size:20px;
padding:8px 12px;
}

.week-detail-dates{font-size:14px;color:rgba(255,255,255,0.7)}

.wd-grid{
display:grid;
grid-template-columns:42px 1fr auto 1fr;
column-gap:54px;
align-items:center;
padding:8px 0;
font-size:13px;
}

.wd-grid.wd-day-row{border-bottom:1px solid rgba(255,255,255,0.06)}

.wd-grid.wd-total-row{
margin-top:8px;
padding-top:8px;
border-top:1px solid rgba(255,255,255,0.15);
font-weight:600;
font-size:14px;
}

.wd-grid .wd-day{font-weight:500}
.wd-grid .wd-val{text-align:left;font-variant-numeric:tabular-nums}
.wd-grid .wd-tgt{text-align:left;white-space:nowrap}
.wd-grid .wd-tgt-inner{color:#FF2FFF;font-weight:700}
.wd-grid .wd-tgt-from{color:rgba(255,255,255,0.35);font-size:11px}
.wd-grid .wd-pct{text-align:right;color:rgba(255,255,255,0.5)}

/* =============================================
   МЕНЮ-БУРГЕР (☰)
   ============================================= */

.burger-list{padding:15px}

.burger-item{
display:block;
width:100%;
padding:16px;
margin-bottom:8px;
border:none;
background:#1a1a1a;
color:white;
font-size:15px;
border-radius:10px;
text-align:left;
}

.burger-item:active{background:#222}

.burger-item{position:relative}
.burger-arrow{
position:absolute;right:16px;top:16px;
font-size:13px;color:rgba(255,255,255,0.4);
transition:transform 0.2s;
}
.burger-arrow.open{transform:rotate(90deg)}

.burger-submenu{
max-height:0;overflow:hidden;
transition:max-height 0.25s ease;
}
.burger-submenu.open{max-height:500px}

.burger-sub-item{
margin-left:20px;
width:calc(100% - 20px);
font-size:13px;
padding:12px 14px;
background:#151515;
}
.burger-sub-item .burger-item-desc{font-size:10px}

.burger-item-desc{
font-size:11px;
color:rgba(255,255,255,0.4);
margin-top:4px;
}

/* =============================================
   ОКНО "ДОБАВИТЬ ЗАДАЧУ" (новая задача + группа)
   ============================================= */

.form-section{padding:15px}

.form-label{
font-size:12px;
color:rgba(255,255,255,0.5);
margin-bottom:6px;
}

.form-input{
width:100%;
padding:12px;
background:#1a1a1a;
border:1px solid rgba(255,255,255,0.15);
border-radius:8px;
color:white;
font-size:15px;
margin-bottom:16px;
}

.form-input:focus{outline:none;border-color:#0a84ff}

.form-existing-groups{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:16px;
}

.form-group-chip{
padding:6px 12px;
border:1px solid rgba(255,255,255,0.25);
border-radius:8px;
background:none;
color:rgba(255,255,255,0.7);
font-size:13px;
}

.form-group-chip.picked{border-color:#0a84ff;color:#0a84ff}
.form-group-chip:active{background:rgba(255,255,255,0.05)}

.form-submit{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a84ff;
color:white;
font-size:15px;
font-weight:600;
}

.form-submit.disabled{opacity:0.25;pointer-events:none}

/* =============================================
   ОКНО "ЗАПИСЬ ЗАДНИМ ЧИСЛОМ"
   ============================================= */

.retro-section{padding:15px}

.retro-mode-row{
display:flex;
gap:8px;
margin-bottom:16px;
}

.retro-mode-btn{
flex:1;
padding:10px;
border:1px solid rgba(255,255,255,0.2);
border-radius:8px;
background:none;
color:rgba(255,255,255,0.5);
font-size:13px;
text-align:center;
}

.retro-mode-btn.active{border-color:#0a84ff;color:#0a84ff}

.retro-time-row{
display:flex;
gap:10px;
margin-bottom:16px;
align-items:center;
}

.retro-time-row label{
font-size:12px;
color:rgba(255,255,255,0.5);
min-width:28px;
}

.retro-time-row input[type="date"],
.retro-time-row input[type="time"]{
padding:10px;
background:#1a1a1a;
border:1px solid rgba(255,255,255,0.15);
border-radius:8px;
color:white;
font-size:15px;
-webkit-appearance:none;
flex:1;
}

.retro-time-row input:focus{outline:none;border-color:#0a84ff}

.retro-act-label{
font-size:12px;
color:rgba(255,255,255,0.5);
margin-bottom:8px;
}

.retro-picker{margin-bottom:16px}

/* =============================================
   ОКНО "ПРОСМОТР JSON"
   ============================================= */

.json-view{
padding:15px;
font-size:12px;
white-space:pre-wrap;
word-break:break-all;
color:rgba(255,255,255,0.7);
font-family:monospace;
max-height:calc(100vh - 80px);
overflow-y:auto;
}

/* =============================================
   НИЖНЯЯ ПАНЕЛЬ (Главная / Лог задач / ☰)
   ============================================= */

.bottom{
position:fixed;
bottom:0;left:0;right:0;
background:#222;
padding:10px 10px;
padding-bottom:calc(24px + env(safe-area-inset-bottom));
display:flex;
gap:5px;
z-index:50;
}

.bottom button{
flex:1;
padding:10px 4px;
border:none;
background:#333;
color:white;
border-radius:6px;
font-size:13px;
}

/* =============================================
   ОКНО "ЛОГ ЗАДАЧ" (история записей по дням)
   ============================================= */

#history{
display:none;
padding:10px 15px;
padding-bottom:120px;
}

/* Разделитель по дням: ПН | 18.03.2026 */
.day-separator{
font-size:14px;
font-weight:700;
padding:12px 0 6px;
margin-top:8px;
color:rgba(255,255,255,0.8);
}

.day-separator:last-of-type{margin-top:0}

/* Строки записей — те же .rec-row что и на главной */

/* =============================================
   ГРАФИКИ
   ============================================= */

#chartsScreen{
display:none;
padding:10px 15px;
padding-bottom:120px;
}

.chart-tabs{
display:flex;
gap:6px;
margin-bottom:14px;
}

.chart-tab{
flex:1;
padding:9px 4px;
border:1px solid rgba(255,255,255,0.2);
border-radius:8px;
background:none;
color:rgba(255,255,255,0.5);
font-size:12px;
text-align:center;
}

.chart-tab.active{border-color:#0a84ff;color:#0a84ff}

/* Календарь выбора периода */
.cal-section{margin-bottom:14px}

.cal-nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.cal-nav button{
background:none;border:none;color:#0a84ff;font-size:20px;padding:6px 10px;
}

.cal-nav span{font-size:14px;color:rgba(255,255,255,0.7)}

.cal-grid{
display:grid;
grid-template-columns:36px repeat(7,1fr);
gap:2px;
font-size:12px;
text-align:center;
}

.cal-hdr{color:rgba(255,255,255,0.4);padding:4px 0;font-weight:600}

.cal-wk{
color:#0a84ff;
font-size:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:4px;
}

.cal-wk:active{background:rgba(10,132,255,0.2)}
.cal-wk.sel{background:rgba(10,132,255,0.3)}

.cal-day{
padding:6px 0;
border-radius:6px;
color:rgba(255,255,255,0.5);
cursor:pointer;
}

.cal-day:active{background:rgba(255,255,255,0.1)}
.cal-day.sel{background:#0a84ff;color:white}
.cal-day.empty{cursor:default}
.cal-day.today-mark{border:1px solid #0a84ff}

.cal-selected-label{
font-size:11px;
color:rgba(255,255,255,0.4);
margin-top:6px;
}

/* Пикер задач для линейных графиков */
.chart-act-picker{margin-bottom:14px}

.chart-act-btn{
display:inline-block;
padding:6px 10px;
margin:2px;
border:1px solid rgba(255,255,255,0.2);
border-radius:6px;
background:none;
color:rgba(255,255,255,0.6);
font-size:12px;
}

.chart-act-btn.sel{border-color:#0a84ff;color:#0a84ff}

.chart-build-btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0a84ff;
color:white;
font-size:14px;
font-weight:600;
margin-bottom:14px;
}

.chart-container{
position:relative;
width:100%;
max-width:100%;
margin-bottom:16px;
}

.chart-container canvas{
width:100%!important;
max-height:350px;
}

.chart-legend{
font-size:12px;
color:rgba(255,255,255,0.6);
}

.chart-legend-item{
display:inline-flex;
align-items:center;
gap:4px;
margin:3px 8px 3px 0;
}

.chart-legend-color{
width:12px;height:12px;border-radius:3px;flex-shrink:0;
}

.chart-tooltip-box{
background:#222;
border:1px solid rgba(255,255,255,0.2);
border-radius:8px;
padding:10px;
font-size:13px;
margin-top:8px;
min-height:40px;
color:rgba(255,255,255,0.7);
}

</style>

</head>

<body>

<header>Мониторинг времени и задач</header>

<!-- ========== ГЛАВНЫЙ ЭКРАН ========== -->
<div class="main-screen" id="main">
  <!-- Рамка: название задачи + крупный таймер -->
  <div class="timer-box">
    <div class="current-activity" id="currentActivity"></div>
    <div class="timer-display" id="timer">0ч 0м 0с</div>
  </div>
  <!-- Кнопки ПУСК и ПУСК ×2 -->
  <div class="buttons-row">
    <button class="start-btn" onclick="openPicker(false)">ПУСК</button>
    <button class="parallel-btn" onclick="openPicker(true)">ПУСК<br>×2</button>
  </div>
  <!-- Лог последних записей на главной (активные + 3 завершённые) -->
  <div class="recent-records" id="recentRecords"></div>
  <!-- Рабочий трекер: дни недели + каунтеры Сегодня/Неделя -->
  <div class="work-tracker">
    <div class="week-days" id="weekDays"></div>
    <div class="work-grid">
      <span class="work-lbl">Сегодня</span>
      <span class="work-val" id="workToday">0ч 0м</span>
      <span class="work-from">из</span>
      <span class="work-tgt"><span class="work-target">10ч</span></span>
      <span class="work-pctcol" id="workTodayPct"></span>
      <span class="work-lbl">Неделя</span>
      <span class="work-val"><span class="work-week-val" id="workWeek" onclick="openWeekDetail(0)">0ч 0м</span></span>
      <span class="work-from">из</span>
      <span class="work-tgt"><span class="work-target">70ч</span></span>
      <span class="work-pctcol" id="workWeekPct"></span>
    </div>
  </div>
</div>

<!-- ========== ПИКЕР ЗАДАЧ (выбор при ПУСК / ПУСК ×2) ========== -->
<div class="overlay" id="picker">
  <div class="overlay-header">
    <span id="pickerTitle">Задача</span>
    <button class="overlay-close" onclick="closePicker()">Закрыть</button>
  </div>
  <div class="picker-hint" id="pickerHint">Выберите 1 задачу</div>
  <button class="picker-confirm single disabled" id="pickerConfirm" onclick="confirmPicker()">Запустить</button>
  <div id="pickerList"></div>
</div>

<!-- ========== ОКНО "РАБОЧИЕ ЧАСЫ" (детализация по дням) ========== -->
<div class="overlay" id="weekOverlay">
  <div class="overlay-header">
    <span>Рабочие часы</span>
    <button class="overlay-close" onclick="closeWeekDetail()">Закрыть</button>
  </div>
  <div class="week-detail" id="weekDetail"></div>
</div>

<!-- ========== МЕНЮ-БУРГЕР (☰) ========== -->
<div class="overlay" id="burgerOverlay">
  <div class="overlay-header">

<script>

// ===== Блокировка скролла (при открытии оверлеев) =====
let scrollY=0;
function lockScroll(){
  scrollY=window.scrollY;
  document.body.classList.add('overlay-open');
  document.body.style.top=-scrollY+'px';
}
function unlockScroll(){
  document.body.classList.remove('overlay-open');
  document.body.style.top='';
  window.scrollTo(0,scrollY);
}

// ===== IndexedDB (основное хранилище данных) =====
const DB_NAME='timetracker', DB_STORE='state';
function dbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=()=>r.result.createObjectStore(DB_STORE);
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
function dbSave(d){
  return dbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put(d,'main');
    tx.oncomplete=()=>{db.close();res()};
    tx.onerror=()=>{db.close();rej(tx.error)};
  }));
}
function dbLoad(){
  return dbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readonly');
    const r=tx.objectStore(DB_STORE).get('main');
    r.onsuccess=()=>{db.close();res(r.result||null)};
    r.onerror=()=>{db.close();rej(r.error)};
  }));
}

// ===== Обновление кеша (кнопка в меню-бургере) =====
function checkUpdate(){
  caches.keys().then(k=>Promise.all(k.map(x=>caches.delete(x)))).then(()=>{
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.getRegistration().then(r=>{
        if(r)r.unregister().then(()=>location.reload());
        else location.reload();
      });
    } else location.reload();
  });
}

// ===== Service Worker (PWA, офлайн) =====
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    setInterval(()=>reg.update(),30000);
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{if(nw.state==='activated')location.reload()});
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
}
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist();

// ===== Дефолтный конфиг (загружается из default_config.json) =====
let defaultConfig={groups:[],activities:[]};

// ===== Состояние (только кастомные данные пользователя) =====
const DEFAULT_STATE={
  customGroups:[],
  customActivities:[],
  records:[],
  active:[]
};
let state=JSON.parse(JSON.stringify(DEFAULT_STATE));

const DAY_NAMES=['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];

// ===== Хелперы: объединение дефолтных + кастомных =====
function getAllGroups(){return defaultConfig.groups.concat(state.customGroups||[])}
function getAllActivities(){return defaultConfig.activities.concat(state.customActivities||[])}
function isKeyGroup(groupId){return defaultConfig.groups.some(g=>g.id===groupId&&g.isKeyGroup)}

// ===== Вспомогательные функции (время, MSK, форматирование) =====
function mskNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Moscow'}))}
function mskDayStartUTC(y,m,d){return new Date(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}T00:00:00+03:00`).getTime()}
function getMondayMSK(mskD){const d=new Date(mskD);let dow=d.getDay();if(dow===0)dow=7;d.setDate(d.getDate()-(dow-1));d.setHours(0,0,0,0);return d}

function toMSK(iso){
  if(!iso)return '...';
  return new Date(iso).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Moscow'});
}
function mskDateObj(iso){
  return new Date(new Date(iso).toLocaleString('en-US',{timeZone:'Europe/Moscow'}));
}
function toMSKDateStr(iso){
  if(!iso)return '';
  const d=mskDateObj(iso);
  const dow=d.getDay();
  return DAY_NAMES[dow===0?6:dow-1]+' | '+String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');
}
function mskDayKey(iso){
  const d=mskDateObj(iso);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function mskDayLabel(iso){
  const d=mskDateObj(iso);
  const dow=d.getDay();
  return DAY_NAMES[dow===0?6:dow-1]+' | '+String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
}
function formatTimeShort(iso){return iso?toMSK(iso)+' ('+toMSKDateStr(iso)+')':'...'}

function hmFromMs(ms){
  if(ms<=0)return '0м';
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);
  if(h>0&&m>0)return h+'ч '+m+'м';
  if(h>0)return h+'ч 0м';
  return m+'м';
}

function durationStr(ms){return hmFromMs(ms)}

function getAct(id){return getAllActivities().find(x=>x.id==id)}
function getActName(id){const a=getAct(id);return a?a.name:'?'}
function getGrpName(actId){const a=getAct(actId);if(!a)return'?';const g=getAllGroups().find(x=>x.id==a.group);return g?g.name:'?'}
function isWork(actId){const a=getAct(actId);if(!a)return false;return isKeyGroup(a.group)}

function getActive(){return state.records.filter(r=>r.end===null)}
function closeAll(now){state.records.forEach(r=>{if(r.end===null)r.end=now});state.active=[]}

function calcWorkMs(from,to){
  const iv=[];
  state.records.forEach(r=>{
    if(!isWork(r.activity))return;
    const rs=new Date(r.start).getTime(),re=r.end?new Date(r.end).getTime():Date.now();
    const s=Math.max(rs,from),e=Math.min(re,to);
    if(e>s)iv.push([s,e]);
  });
  if(!iv.length)return 0;
  iv.sort((a,b)=>a[0]-b[0]);
  const mg=[[...iv[0]]];
  for(let i=1;i<iv.length;i++){const l=mg[mg.length-1];if(iv[i][0]<=l[1])l[1]=Math.max(l[1],iv[i][1]);else mg.push([...iv[i]])}
  let t=0;mg.forEach(x=>t+=x[1]-x[0]);return t;
}

// ===== Разрезка записей по полуночи MSK (для отображения по дням) =====
function splitAtMidnights(records){
  const result=[];
  records.forEach(r=>{
    if(!r.end){result.push(r);return}
    let isFirst=true;
    let cs=new Date(r.start).getTime();
    const ce=new Date(r.end).getTime();
    while(cs<ce){
      const msk=mskDateObj(new Date(cs).toISOString());
      const nextDay=new Date(msk);
      nextDay.setDate(nextDay.getDate()+1);nextDay.setHours(0,0,0,0);
      const midnightUTC=mskDayStartUTC(nextDay.getFullYear(),nextDay.getMonth()+1,nextDay.getDate());
      if(midnightUTC>=ce){
        result.push({...r,start:new Date(cs).toISOString(),end:new Date(ce).toISOString(),note:isFirst?r.note||'':'',_origId:r.id});
        isFirst=false;
        cs=ce;
      } else {
        result.push({...r,id:r.id+Math.random(),start:new Date(cs).toISOString(),end:new Date(midnightUTC).toISOString(),note:isFirst?r.note||'':'',_origId:r.id});
        isFirst=false;
        cs=midnightUTC;
      }
    }
  });
  return result;
}

// ===== Физическая разрезка записей по полуночи MSK (в state.records) =====
function physicalSplitAtMidnights(){
  const result=[];
  let changed=false;
  state.records.forEach(r=>{
    if(!r.end){result.push(r);return}
    let cs=new Date(r.start).getTime();
    const ce=new Date(r.end).getTime();
    let isFirst=true;
    while(cs<ce){
      const msk=mskDateObj(new Date(cs).toISOString());
      const nextDay=new Date(msk);
      nextDay.setDate(nextDay.getDate()+1);nextDay.setHours(0,0,0,0);
      const midnightUTC=mskDayStartUTC(nextDay.getFullYear(),nextDay.getMonth()+1,nextDay.getDate());
      if(midnightUTC>=ce){
        result.push(isFirst?r:{id:Date.now()+Math.random()*1000|0,activity:r.activity,start:new Date(cs).toISOString(),end:new Date(ce).toISOString(),note:''});
        cs=ce;
      } else {
        changed=true;
        if(isFirst){
          result.push({...r,end:new Date(midnightUTC).toISOString()});
        } else {
          result.push({id:Date.now()+Math.random()*1000|0,activity:r.activity,start:new Date(cs).toISOString(),end:new Date(midnightUTC).toISOString(),note:''});
        }
        cs=midnightUTC;
      }
      isFirst=false;
    }
  });
  if(changed){state.records=result;state.records.sort((a,b)=>new Date(a.start)-new Date(b.start))}
  return changed;
}

function migrateState(d){
  if(d.active&&!Array.isArray(d.active))d.active=[];else if(!d.active)d.active=[];
  // Migrate old format: groups/activities -> customGroups/customActivities
  if(d.groups&&!d.customGroups){
    // Filter out default groups/activities by id
    const defGids=new Set(defaultConfig.groups.map(g=>g.id));
    const defAids=new Set(defaultConfig.activities.map(a=>a.id));
    d.customGroups=(d.groups||[]).filter(g=>!defGids.has(g.id));
    d.customActivities=(d.activities||[]).filter(a=>!defAids.has(a.id));
    delete d.groups;delete d.activities;
  }
  if(!d.customGroups)d.customGroups=[];
  if(!d.customActivities)d.customActivities=[];
  return d;
}

// ===== Инициализация (загрузка default_config.json + данных из IndexedDB / localStorage) =====
(async function(){
  // 1. Load default config
  try{
    const resp=await fetch('./default_config.json');
    if(resp.ok)defaultConfig=await resp.json();
  }catch(e){console.warn('default_config.json not loaded',e)}
  // 2. Load user data
  let d=null;
  try{d=await dbLoad()}catch(e){}
  if(!d){const ls=localStorage.getItem("timedata");if(ls){d=JSON.parse(ls);try{await dbSave(d)}catch(e){}}}
  state=d?migrateState(d):JSON.parse(JSON.stringify(DEFAULT_STATE));
  state.active=state.records.filter(r=>r.end===null).map(r=>r.id);
  if(physicalSplitAtMidnights())save();
  renderMain();updateTimer();updateWorkTracker();
})();

function save(){
  state.active=state.records.filter(r=>r.end===null).map(r=>r.id);
  localStorage.setItem("timedata",JSON.stringify(state));
  dbSave(state).catch(()=>{});
}

// ===== Строка записи (buildRecRow) — используется в логе на главной и в "Лог задач" =====
function shortDate(iso){
  if(!iso)return '';
  const d=mskDateObj(iso);
  const dow=d.getDay();
  return DAY_NAMES[dow===0?6:dow-1]+' '+String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');
}

function hmsFromMs(ms){
  if(ms<=0)return '0ч 0м 0с';
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  return h+'ч '+m+'м '+s+'с';
}

// ===== Микро-Лог (note) =====
let noteRecordId=null;
function openNote(recordId){
  const r=state.records.find(x=>x.id===recordId);
  if(!r)return;
  noteRecordId=recordId;
  document.getElementById('noteInfo').innerText=getGrpName(r.activity)+' ➠ '+getActName(r.activity)+' — '+toMSK(r.start)+' — '+(r.end?toMSK(r.end):'...');
  const ta=document.getElementById('noteText');
  ta.value=r.note||'';
  ta.oninput=()=>{r.note=ta.value;save()};
  lockScroll();document.getElementById('noteOverlay').classList.add('open');
}
function closeNote(){
  document.getElementById('noteOverlay').classList.remove('open');unlockScroll();
  noteRecordId=null;
  renderMain();
  if(document.getElementById('history').style.display==='block')showHistory();
}

function buildRecRow(r, isCurrent, showDate){
  const row=document.createElement('div');
  row.className='rec-row'+(isCurrent?' cur':'');

  // Find original record for note click (r may be a midnight-split copy with _origId)
  const origId=r._origId||r.id;
  const origRec=state.records.find(x=>x.id===origId);
  if(origRec){row.onclick=()=>openNote(origId)}

  const dateEl=document.createElement('span');
  dateEl.className='rec-date';
  dateEl.innerText=showDate!==false?shortDate(r.start):'';

  const name=document.createElement('span');
  name.className='rec-name';
  name.innerText=getGrpName(r.activity)+' ➠ '+getActName(r.activity);

  // Note icon — check original record's note for split rows
  const icon=document.createElement('span');
  icon.className='rec-note-icon';
  const origNote=origRec?origRec.note:'';
  const hasNote=origNote&&origNote.trim();
  const work=isWork(r.activity);
  if(work){icon.classList.add(hasNote?'green':'red');icon.innerText='ⓘ'}
  else if(hasNote){icon.classList.add('white');icon.innerText='ⓘ'}
  else{icon.classList.add('hidden')}

  const times=document.createElement('span');
  times.className='rec-times';
  times.innerHTML='<b>'+toMSK(r.start)+'</b> — <b>'+(r.end?toMSK(r.end):'...')+'</b>';

  const dur=document.createElement('span');
  dur.className='rec-dur';
  if(isCurrent&&!r.end){
    dur.classList.add('live');
    dur.dataset.start=r.start;
  } else {
    const ms=r.end?(new Date(r.end)-new Date(r.start)):0;
    dur.innerText=r.end?durationStr(ms):'...';
  }

  row.appendChild(dateEl);
  row.appendChild(name);
  row.appendChild(icon);
  row.appendChild(times);
  row.appendChild(dur);
  return row;
}

// ===== Рендер списка задач в пикере =====
function renderInlinePicker(container, selected, parallel, onSelect){
  container.innerHTML='';
  getAllGroups().forEach(g=>{
    const row=document.createElement('div');
    row.className='picker-group';
    const label=document.createElement('span');
    label.className='picker-group-label';
    label.innerText=g.name;
    row.appendChild(label);
    getAllActivities().filter(a=>a.group==g.id).forEach(a=>{
      const btn=document.createElement('button');
      btn.className='activity';
      btn.innerText=a.name;
      if(selected.includes(a.id))btn.classList.add(parallel?'selected':'active');
      btn.onclick=()=>onSelect(a.id);
      row.appendChild(btn);
    });
    container.appendChild(row);
  });
}

// ===== Пикер задач (ПУСК / ПУСК ×2) =====
let pickerParallel=false, pickerSelected=[];

function openPicker(parallel){
  pickerParallel=parallel;pickerSelected=[];
  document.getElementById('pickerTitle').innerText=parallel?'Параллельные задачи':'Задача';
  document.getElementById('pickerHint').innerText=parallel?'Выберите 2 задачи':'Выберите 1 задачу';
  updateConfirmBtn();
  renderInlinePicker(document.getElementById('pickerList'),pickerSelected,parallel,onPickerSelect);
  lockScroll();
  document.getElementById('picker').classList.add('open');
}

function onPickerSelect(actId){
  const max=pickerParallel?2:1;
  const idx=pickerSelected.indexOf(actId);
  if(idx>=0)pickerSelected.splice(idx,1);
  else if(pickerSelected.length>=max){if(!pickerParallel)pickerSelected=[actId];else return}
  else pickerSelected.push(actId);
  updateConfirmBtn();

  document.getElementById('workToday').innerText=hmFromMs(todayMs);

  const earliest=Math.min(...active.map(r=>new Date(r.start).getTime()));
  const diff=(Date.now()-earliest)/1000;
  const h=Math.floor(diff/3600),m=Math.floor(diff%3600/60),s=Math.floor(diff%60);
  el.innerText=h+'ч '+m+'м '+s+'с';
  // Update live durations in rec rows
  document.querySelectorAll('.rec-dur.live').forEach(d=>{
    const ms=Date.now()-new Date(d.dataset.start).getTime();
    d.innerText=hmsFromMs(ms);
  });

}

function submitRetro(){
  if(!retroActId)return;
  const sd=document.getElementById('retroStartDate').value;
  const st=document.getElementById('retroStartTime').value;
  const ed=document.getElementById('retroEndDate').value;
  const et=document.getElementById('retroEndTime').value;

function insertRecordSingle(actId, startISO, endISO){
  const ns=new Date(startISO).getTime(), ne=new Date(endISO).getTime();
  const newRecs=[];
  state.records.forEach(r=>{
    const rs=new Date(r.start).getTime();
    const re=r.end?new Date(r.end).getTime():null;
    if(re===null){
      if(rs<ns){
        newRecs.push({...r, end:startISO, id:r.id});
        newRecs.push({...r, id:Date.now()+Math.random()*1000|0, start:endISO, end:null});
      } else if(rs>=ns && rs<ne){
        newRecs.push({...r, start:endISO});
      } else {
        newRecs.push(r);
      }
      return;
    }
    if(re<=ns || rs>=ne){newRecs.push(r);return}
    if(rs<ns) newRecs.push({...r, end:startISO});
    if(re>ne) newRecs.push({...r, id:Date.now()+Math.random()*1000|0, start:endISO, end:r.end});
  });
  newRecs.push({id:Date.now(),activity:actId,start:startISO,end:endISO});
  newRecs.sort((a,b)=>new Date(a.start)-new Date(b.start));
  const merged=[];
  newRecs.forEach(r=>{
    const last=merged[merged.length-1];
    if(last && last.activity===r.activity && last.end===r.start){last.end=r.end}
    else merged.push({...r});
  });
  state.records=merged;
}

// ===== Подсчёт времени задачи за день (ms) =====
function calcActDayMs(actId,dayKey){
  const parts=dayKey.split('-');
  const y=+parts[0],m=+parts[1],d=+parts[2];
  const from=mskDayStartUTC(y,m,d),to=from+86400000;
  // Collect intervals, then merge overlapping
  const iv=[];
  state.records.forEach(r=>{
    if(r.activity!==actId)return;
    const rs=new Date(r.start).getTime(),re=r.end?new Date(r.end).getTime():Date.now();
    const s=Math.max(rs,from),e=Math.min(re,to);
    if(e>s)iv.push([s,e]);
  });
  if(!iv.length)return 0;
  iv.sort((a,b)=>a[0]-b[0]);
  const mg=[[...iv[0]]];
  for(let i=1;i<iv.length;i++){const l=mg[mg.length-1];if(iv[i][0]<=l[1])l[1]=Math.max(l[1],iv[i][1]);else mg.push([...iv[i]])}
  let t=0;mg.forEach(x=>t+=x[1]-x[0]);return t;
}

// Подсчёт времени группы за набор дней
function calcGroupMs(gId,days){
  let total=0;
  const acts=getAllActivities().filter(a=>a.group===gId).map(a=>a.id);
  days.forEach(dk=>{acts.forEach(aid=>{total+=calcActDayMs(aid,dk)})});
  return total;
}

  document.getElementById('chartLegend').innerHTML='';

  if(chartType==='pie')buildPieChart(days);
  else if(chartType==='line')buildLineChart(days);
  else buildStackChart(days);
}

// ===== Плагин подписей внутри круговой диаграммы =====
const pieLabelsPlugin={
  id:'pieLabels',
  afterDraw(chart){
    const ds=chart.data.datasets[0];
    if(!ds)return;
    const total=ds.data.reduce((s,v)=>s+v,0);
    if(!total)return;
    const ctx=chart.ctx;
    const meta=chart.getDatasetMeta(0);
    ctx.save();
    ctx.fillStyle='#fff';
    ctx.font='bold 11px -apple-system,Arial,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    meta.data.forEach((arc,i)=>{
      const pct=ds.data[i]/total*100;
      if(pct<5)return;
      const midAngle=(arc.startAngle+arc.endAngle)/2;
      const r=(arc.innerRadius+arc.outerRadius)/2*0.85;
      const x=arc.x+Math.cos(midAngle)*r;
      const y=arc.y+Math.sin(midAngle)*r;
      ctx.fillText(chart.data.labels[i],x,y);
    });
    ctx.restore();
  }
};

// ===== 1. КРУГОВАЯ ДИАГРАММА =====
function buildPieChart(days){
  const gIdx={};
  let gi=0;
  const groupData=[];
  getAllGroups().forEach(g=>{
    const gMs=calcGroupMs(g.id,days);
    if(gMs<=0)return;
    gIdx[g.id]=gi++;
    const acts=[];
    getAllActivities().filter(a=>a.group===g.id).forEach(a=>{
      let ms=0;days.forEach(dk=>{ms+=calcActDayMs(a.id,dk)});
      if(ms>0)acts.push({id:a.id,name:a.name,ms});
    });
    acts.sort((a,b)=>b.ms-a.ms);
    groupData.push({id:g.id,name:g.name,ms:gMs,acts,hue:getGroupHue(gIdx[g.id])});
  });
  groupData.sort((a,b)=>b.ms-a.ms);

  const labels=[],data=[],colors=[],meta=[];
  const totalMs=groupData.reduce((s,g)=>s+g.ms,0);
  groupData.forEach(g=>{
    g.acts.forEach((a,i)=>{
      const light=50+i*8;
      const sat=Math.max(35,75-i*12);
      labels.push(a.name);
      data.push(a.ms/3600000);
      colors.push('hsl('+g.hue+','+sat+'%,'+light+'%)');
      meta.push({actName:a.name,groupName:g.name,ms:a.ms,pct:(a.ms/totalMs*100).toFixed(1)});
    });
  });

  const ctx=document.getElementById('chartCanvas').getContext('2d');
  currentChart=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:1,borderColor:'#111'}]},
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{enabled:false}
      },
      onClick:(e,els)=>{
        if(els.length){
          const m=meta[els[0].index];
          document.getElementById('chartTooltip').innerText=m.groupName+' → '+m.actName+': '+hmFromMs(m.ms)+' ('+m.pct+'%)';
        }
      }
    },
    plugins:[pieLabelsPlugin]
  });

  const leg=document.getElementById('chartLegend');
  groupData.forEach(g=>{
    const item=document.createElement('span');
    item.className='chart-legend-item';
    item.innerHTML='<span class="chart-legend-color" style="background:hsl('+g.hue+',75%,50%)"></span>'+g.name+' — '+hmFromMs(g.ms)+' ('+(g.ms/totalMs*100).toFixed(1)+'%)';
    leg.appendChild(item);
  });
}

// ===== 2. ЛИНЕЙНЫЙ ГРАФИК =====
function buildLineChart(days){
  if(!chartSelectedActs.length)return;
  const dayLabels=days.map(dk=>{const p=dk.split('-');return p[2]+'.'+p[1]});

  const datasets=[];
  let gi=0;
  const gHueMap={};
  const actCountInGroup={};

  chartSelectedActs.forEach(actId=>{
    const a=getAct(actId);if(!a)return;
    if(!(a.group in gHueMap)){gHueMap[a.group]=getGroupHue(gi++);actCountInGroup[a.group]=0}
    const aIdx=actCountInGroup[a.group]++;
    const hue=gHueMap[a.group];
    const sat=Math.max(40, 80-aIdx*15);

    const vals=days.map(dk=>calcActDayMs(actId,dk)/3600000);
    datasets.push({
      label:getGrpName(actId)+' ➠ '+a.name,
      data:vals,
      borderColor:'hsl('+hue+','+sat+'%,55%)',
      backgroundColor:'hsl('+hue+','+sat+'%,55%)',
      tension:0.3,
      pointRadius:4,
      pointHitRadius:20,
      fill:false,
      _actId:actId
    });
  });

  const ctx=document.getElementById('chartCanvas').getContext('2d');
  currentChart=new Chart(ctx,{
    type:'line',
    data:{labels:dayLabels,datasets},
    options:{
      responsive:true,
      interaction:{mode:'nearest',intersect:true},
      scales:{
        y:{beginAtZero:true,title:{display:true,text:'Часы',color:'rgba(255,255,255,0.5)'},ticks:{color:'rgba(255,255,255,0.4)'},grid:{color:'rgba(255,255,255,0.06)'}},
        x:{ticks:{color:'rgba(255,255,255,0.4)'},grid:{color:'rgba(255,255,255,0.06)'}}
      },
      plugins:{
        legend:{display:false},
        tooltip:{enabled:false}
      },
      onClick:(e,els)=>{
        if(els.length){
          const di=els[0].datasetIndex,pi=els[0].index;
          const ds=datasets[di];
          const hrs=ds.data[pi];
          document.getElementById('chartTooltip').innerText=ds.label+' — '+days[pi]+': '+hmFromMs(hrs*3600000);
        }
      }
    }
  });

  // Legend
  const leg=document.getElementById('chartLegend');
  datasets.forEach(ds=>{
    const item=document.createElement('span');
    item.className='chart-legend-item';
    item.innerHTML='<span class="chart-legend-color" style="background:'+ds.borderColor+'"></span>'+ds.label;
    leg.appendChild(item);
  });
}

// ===== 3. БУТЕРБРОД (stacked area) =====
function buildStackChart(days){
  if(!chartSelectedActs.length)return;
  const dayLabels=days.map(dk=>{const p=dk.split('-');return p[2]+'.'+p[1]});

  const datasets=[];
  let gi=0;
  const gHueMap={};
  const actCountInGroup={};

  // Build datasets in order (first selected = bottom)
  chartSelectedActs.forEach(actId=>{
    const a=getAct(actId);if(!a)return;
    if(!(a.group in gHueMap)){gHueMap[a.group]=getGroupHue(gi++);actCountInGroup[a.group]=0}
    const aIdx=actCountInGroup[a.group]++;
    const hue=gHueMap[a.group];
    const sat=Math.max(40, 80-aIdx*15);

    const vals=days.map(dk=>calcActDayMs(actId,dk)/3600000);
    datasets.push({
      label:getGrpName(actId)+' ➠ '+a.name,
      data:vals,
      backgroundColor:'hsla('+hue+','+sat+'%,50%,0.7)',
      borderColor:'hsl('+hue+','+sat+'%,55%)',
      borderWidth:1,
      fill:true,
      pointRadius:4,
      pointHitRadius:20,
      _actId:actId
    });
  });

  const ctx=document.getElementById('chartCanvas').getContext('2d');
  currentChart=new Chart(ctx,{
    type:'line',
    data:{labels:dayLabels,datasets},
    options:{
      responsive:true,
      interaction:{mode:'nearest',intersect:true},
      scales:{
        y:{
          stacked:true,
          beginAtZero:true,
          title:{display:true,text:'Часы',color:'rgba(255,255,255,0.5)'},
          ticks:{color:'rgba(255,255,255,0.4)'},
          grid:{color:'rgba(255,255,255,0.06)'}
        },
        x:{
          ticks:{color:'rgba(255,255,255,0.4)'},
          grid:{color:'rgba(255,255,255,0.06)'}
        }
      },
      plugins:{
        legend:{display:false},
        tooltip:{enabled:false},
        filler:{propagate:true}
      },
      onClick:(e,els)=>{
        if(els.length){
          const di=els[0].datasetIndex,pi=els[0].index;
          const ds=datasets[di];
          const hrs=ds.data[pi];
          const pct=(hrs/24*100).toFixed(1);
          document.getElementById('chartTooltip').innerText=ds.label+' — '+days[pi]+': '+hmFromMs(hrs*3600000)+' ('+pct+'% дня)';
        }
      }
    }
  });

  // Legend
  const leg=document.getElementById('chartLegend');
  datasets.forEach(ds=>{
    const item=document.createElement('span');
    item.className='chart-legend-item';
    item.innerHTML='<span class="chart-legend-color" style="background:'+ds.backgroundColor+'"></span>'+ds.label;
    leg.appendChild(item);
  });
}

function importData(){
  const inp=document.createElement('input');inp.type='file';
  inp.onchange=e=>{
    const rd=new FileReader();
    rd.onload=()=>{state=migrateState(JSON.parse(rd.result));state.active=state.records.filter(r=>r.end===null).map(r=>r.id);physicalSplitAtMidnights();save();renderMain()};
    rd.readAsText(e.target.files[0]);
  };
  inp.click();
}

</script>
